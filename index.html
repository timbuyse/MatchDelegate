<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Match Delegate">
  <meta name="theme-color" content="#101010">
  <link rel="stylesheet" href="fonts/tabler-icons.min.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="MD_cropped.png">
  <link rel="apple-touch-icon" href="MD_cropped.png">
  <title>Match Delegate</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --blk:#0f172a;--blk2:#1e293b;--blk3:#334155;
      --grn:#2f9e57;--grn2:#247d44;--grnp:#dcf1e3;--grnb:#aedcbd;
      --org:#2f74bd;--org2:#255f9c;--orgp:#e1edf8;--orgb:#bdd6ef;
      --tel:#0d9488;--tel2:#0f766e;--telp:#ccfbf1;
      --orn:#f97316;--orn2:#c2410c;--ornp:#ffedd5;
      --yl:#eab308;--ylp:#fef9c3;--rd:#dc2626;--rdp:#fee2e2;--bl:#2563eb;--blp:#eff6ff;
      --bg:#f5f6f5;--card:#fff;--txt:#171717;--txt2:#6b7280;--bdr:#e5e7eb;
      --shadow:0 2px 8px rgba(0,0,0,.1)
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100dvh;overflow-x:hidden}
    /* Header */
    .hdr{background:url('background_logo.jpg') center/cover no-repeat;color:#fff;padding:14px 20px;min-height:80px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.4);border-bottom:none;position:relative;box-sizing:border-box}
    .hdr::before{content:'';position:absolute;inset:0;background:rgba(0,0,0,.55);z-index:0;pointer-events:none}
    .hdr>*{position:relative;z-index:1}
    .hdr h1{font-size:17px;font-weight:700;flex:1}
    .hdr-sub{font-size:12px;opacity:.7}
    .back{background:none;border:none;color:#fff;font-size:26px;cursor:pointer;padding:2px 4px;line-height:1}
    .hdr-btn{background:var(--org);border:none;color:#fff;font-size:13px;font-weight:700;padding:7px 13px;border-radius:8px;cursor:pointer}
    .hdr-logo{width:30px;height:30px;border-radius:7px;flex-shrink:0}
    .hdr-home{justify-content:center;padding:14px 20px}
    .hdr-fulllogo{height:44px;width:auto}
    .credit{text-align:center;font-size:12px;color:var(--txt2);padding:4px 0 28px}
    .credit b{color:var(--blk)}
    .hdr-gear{background:none;border:none;color:#fff;font-size:21px;cursor:pointer;opacity:.85;padding:6px;z-index:2;flex-shrink:0}
    .hdr-gear-beheer{background:#1f9d55;color:#fff;border:none;border-radius:999px;padding:5px 10px;font-size:13px;font-weight:700;cursor:pointer;z-index:2;flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:4px;white-space:nowrap;user-select:none}
    .hdr-crest{height:52px;width:52px;object-fit:contain;flex-shrink:0}
    .hdr-clubname{font-size:17px;font-weight:800;color:#fff;margin-left:9px}
    .logo-preview{display:flex;justify-content:center;margin-bottom:10px}
    .logo-preview img{max-height:120px;max-width:85%;object-fit:contain;background:var(--blk);border-radius:12px;padding:12px}
    .logo-empty{height:110px;width:100%;max-width:85%;border:2px dashed var(--bdr);border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--txt2);font-size:14px;font-weight:600}
    .file-btn{display:block;width:100%;padding:13px;border:2px dashed var(--grnb);border-radius:10px;text-align:center;font-size:14px;font-weight:700;color:var(--grn2);cursor:pointer;background:var(--grnp)}
    .file-btn input[type=file]{display:none}
    .welcome{text-align:center;padding:8px 4px 16px}
    .welcome h2{font-size:22px;margin-bottom:6px}
    .welcome p{font-size:14px;color:var(--txt2);line-height:1.5}
    /* Content */
    .content{padding:16px;max-width:600px;margin:0 auto;padding-bottom:calc(24px + env(safe-area-inset-bottom))}
    /* Card */
    .card{background:var(--card);border-radius:12px;box-shadow:var(--shadow);padding:16px;margin-bottom:12px}
    /* Buttons */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 20px;border-radius:10px;border:none;font-size:16px;font-weight:600;cursor:pointer;min-height:50px;width:100%;transition:opacity .15s,transform .1s}
    .btn:active{transform:scale(.97);opacity:.85}
    .btn-green{background:var(--grn);color:#fff}
    .btn-org{background:var(--org);color:#fff}
    .btn-dark{background:var(--blk);color:#fff}
    .btn-pale{background:var(--grnp);color:var(--grn2)}
    .btn-orgpale{background:var(--orgp);color:var(--org2)}
    .btn-red{background:var(--rdp);color:var(--rd)}
    .btn-gray{background:#f1f1f1;color:var(--txt)}
    .btn-sm{padding:9px 14px;font-size:14px;min-height:38px;width:auto}
    /* Form */
    .fg{margin-bottom:14px}
    .fg label{display:block;font-size:12px;font-weight:700;color:var(--txt2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
    .fg input,.fg select{width:100%;padding:12px;border:2px solid var(--bdr);border-radius:8px;font-size:16px;color:var(--txt);background:#fff;-webkit-appearance:none}
    .fg input:focus,.fg select:focus{outline:none;border-color:var(--grn)}
    .fg textarea{width:100%;padding:12px;border:2px solid var(--bdr);border-radius:8px;font-size:16px;color:var(--txt);font-family:inherit;resize:vertical;-webkit-appearance:none}
    .fg textarea:focus{outline:none;border-color:var(--grn)}
    .fg-pwd{position:relative}.fg-pwd input{padding-right:44px!important}
    .pwd-eye{position:absolute;right:2px;bottom:2px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;color:var(--txt);opacity:.5;font-size:20px;border-radius:6px;line-height:1}
    .pwd-eye:hover{opacity:1}
    body.dark .pwd-eye{color:#e8eaed}
    .chkrow{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:13px;font-weight:600;color:var(--txt2);text-transform:none;letter-spacing:0}
    .chkrow input{width:auto;transform:scale(1.3)}
    .team-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
    .team-chips-lbl{width:100%;font-size:12px;color:var(--txt2);font-weight:600;text-transform:none;letter-spacing:0;margin-bottom:2px}
    .team-chip{display:inline-flex;align-items:center;gap:5px;padding:6px 5px 6px 12px;border-radius:20px;border:2px solid var(--bdr);background:#fff;font-size:13px;font-weight:600;cursor:pointer}
    .team-chip-x{border:none;background:var(--rdp);color:var(--rd);width:21px;height:21px;border-radius:50%;font-size:14px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .filterbar{margin-bottom:12px}
    .filterbar select{width:100%;padding:11px;border:2px solid var(--bdr);border-radius:10px;font-size:15px;background:#fff;font-weight:600;color:var(--txt);-webkit-appearance:none}
    .notes-txt{white-space:pre-wrap;font-size:14px;line-height:1.45}
    .photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
    .photo-slot{position:relative;border-radius:10px;overflow:hidden;background:var(--bg);border:2px dashed var(--bdr);aspect-ratio:4/3;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:var(--txt2);font-weight:600;gap:6px}
    .photo-slot img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
    .photo-slot .photo-del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:26px;height:26px;font-size:16px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .photo-slot-lbl{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.45);color:#fff;font-size:10px;font-weight:700;text-align:center;padding:3px;letter-spacing:.5px}
    .more-details{margin-top:6px;border-top:1px solid var(--bdr);padding-top:10px}
    .more-details summary{font-size:13px;font-weight:700;color:var(--grn2);cursor:pointer;list-style:none}
    .more-details summary::-webkit-details-marker{display:none}
    .pmins-low{color:var(--org)!important;font-weight:800}
    .evt-del{margin-left:auto;background:var(--rdp);border:none;color:var(--rd);width:28px;height:28px;border-radius:7px;font-size:15px;cursor:pointer;flex-shrink:0}
    .stat-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bdr);font-size:14px}
    .stat-row:last-child{border-bottom:none}
    .stat-rank{width:24px;font-weight:800;color:var(--txt2)}
    .stat-big{display:flex;gap:10px;flex-wrap:wrap}
    .stat-box{flex:1;min-width:90px;background:var(--bg);border-radius:10px;padding:12px;text-align:center}
    .stat-box .v{font-size:24px;font-weight:900}
    .stat-box .l{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
    /* Section label */
    .sec{font-size:12px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px}
    /* Match list */
    .match-item{background:var(--card);border-radius:12px;box-shadow:var(--shadow);padding:14px 16px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:14px;border-left:5px solid var(--tel)}
    .match-item:active{transform:scale(.99)}
    .match-item.live-border{border-left-color:var(--rd)}
    .live-pulse-dot{width:10px;height:10px;border-radius:50%;background:var(--rd);display:inline-block;flex-shrink:0;animation:livePulse 1.4s ease-in-out infinite}
    @keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
    @keyframes goalShake{0%,100%{transform:none}20%{transform:scale(1.08) rotate(-2deg)}40%{transform:scale(1.06) rotate(2deg)}60%{transform:scale(1.04) rotate(-1deg)}80%{transform:scale(1.02) rotate(1deg)}}
    .goal-anim{animation:goalShake .55s cubic-bezier(.36,.07,.19,.97) both}
    @keyframes cardFlip{0%{transform:rotateY(0)}50%{transform:rotateY(90deg)}100%{transform:rotateY(0)}}
    .card-anim{animation:cardFlip .4s ease both}
    .timer-progress-wrap{height:4px;background:var(--bdr);border-radius:2px;margin-top:8px;overflow:hidden}
    .timer-progress-bar{height:4px;background:var(--grn);border-radius:2px;transition:width .9s linear}
    .match-item.plan-border{border-left-color:var(--orn)}
    .mi-info{flex:1}
    .mi-opp{font-size:16px;font-weight:700}
    .mi-date{font-size:12px;color:var(--txt2);margin-top:2px}
    .mi-score{font-size:28px;font-weight:900;color:var(--blk);font-variant-numeric:tabular-nums}
    .badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;margin-top:4px}
    .badge-live{background:var(--rdp);color:var(--rd)}
    .badge-done{background:var(--telp);color:var(--tel2)}
    .badge-plan{background:var(--ornp);color:var(--orn2)}
    .badge-type{background:var(--blk2);color:#fff;margin-left:5px}
    /* Scoreboard */
    .scoreboard{background:var(--blk);color:#fff;border-radius:16px;padding:18px;text-align:center;margin-bottom:12px;border-bottom:3px solid var(--org)}
    .sb-teams{display:flex;justify-content:space-between;font-size:12px;opacity:.7;margin-bottom:4px}
    .sb-score{font-size:64px;font-weight:900;line-height:1;letter-spacing:6px;font-variant-numeric:tabular-nums}
    .sb-score .us{color:var(--grn)}
    .grn{color:var(--grn)}
    .sb-info{font-size:13px;opacity:.7;margin-top:6px}
    /* Timer */
    .timer-card{background:var(--blk2);color:#fff;border-radius:14px;padding:16px;text-align:center;margin-bottom:12px}
    .timer-time{font-size:54px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:3px;line-height:1}
    .timer-lbl{font-size:13px;opacity:.7;margin-top:6px}
    .qdots{display:flex;justify-content:center;gap:8px;margin-top:10px}
    .qdot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,.25)}
    .qdot.done{background:var(--org)}
    .qdot.active{background:var(--grn)}
    /* Quarter controls */
    .qctrl{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
    .qbtn{padding:14px 10px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;min-height:50px}
    .qbtn:active{transform:scale(.96)}
    .qbtn-start{background:var(--grn);color:#fff}
    .qbtn-pause{background:var(--ylp);color:var(--yl)}
    .qbtn-end{background:var(--rdp);color:var(--rd)}
    .qbtn-resume{background:var(--blp);color:var(--bl)}
    .qbtn:disabled{opacity:.35;pointer-events:none}
    /* Event buttons */
    .evtbtns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:16px}
    .evtbtn{border:2px solid var(--bdr);border-radius:12px;padding:12px 4px;text-align:center;cursor:pointer;background:var(--card);transition:transform .1s}
    .evtbtn:active{transform:scale(.93)}
    .evtbtn .ei{font-size:26px;display:block;margin-bottom:3px}
    .evtbtn .el{font-size:11px;font-weight:700;color:var(--txt2)}
    .evtbtn.eg{border-color:var(--grnb);background:var(--grnp)}
    .evtbtn.ec{border-color:var(--orgb);background:var(--orgp)}
    .evtbtn.es{border-color:#bcd0ee;background:var(--blp)}
    .evtbtn.eyel{border-color:#fde047;background:var(--ylp)}
    .evtbtn.ered{border-color:#fca5a5;background:var(--rdp)}
    .evtbtn.epen{border-color:var(--grnb);background:#fff}
    .evtbtn.efk{border-color:var(--bdr);background:#fff}
    .evtbtn.einj{border-color:#d8b4fe;background:#faf5ff}
    .seg button.absent{background:var(--rd);color:#fff}
    .today-banner{background:var(--blk);color:#fff;border-radius:12px;padding:14px 16px;margin-bottom:14px;border-left:5px solid var(--org)}
    .today-banner h3{font-size:14px;font-weight:700;color:var(--org);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
    .today-match{display:flex;align-items:center;gap:12px;padding:10px 0;border-top:1px solid rgba(255,255,255,.1)}
    .today-match:first-of-type{padding-top:0;border-top:none}
    .today-match .tm-info{flex:1}
    .today-match .tm-opp{font-size:15px;font-weight:700}
    .today-match .tm-sub{font-size:12px;opacity:.7;margin-top:2px}
    .evtbtn.disabled{opacity:.35;pointer-events:none}
    /* Player row */
    .pn-inp{width:40px;height:34px;border:2px solid var(--bdr);border-radius:8px;font-size:14px;font-weight:700;text-align:center;padding:0 2px;-webkit-appearance:none;background:#fff;flex-shrink:0;color:var(--txt)}
    .prow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--bdr)}
    .prow:last-child{border-bottom:none}
    .pnum{width:34px;height:34px;border-radius:50%;background:var(--blk);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
    .pnum-off{background:#9ca3af}
    .pname{font-weight:600;font-size:15px}
    .ppos{font-size:12px;color:var(--txt2)}
    .pmins{margin-left:auto;font-size:13px;color:var(--txt2);font-weight:600;white-space:nowrap}
    .pedit{margin-left:8px;background:var(--grnp);border:none;color:var(--grn2);width:34px;height:34px;border-radius:8px;font-size:15px;cursor:pointer}
    /* Event log */
    .elog{list-style:none}
    .elog li{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bdr);font-size:14px}
    .elog li:last-child{border-bottom:none}
    .emin{font-weight:800;color:var(--txt2);font-size:12px;min-width:42px}
    .etxt{flex:1}
    /* Event-log gegroepeerd per deel */
    .qgroup{margin-bottom:4px}
    .qgroup-head{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#fff;background:var(--blk2);padding:7px 11px;border-radius:8px;margin:12px 0 2px}
    .qgroup:first-child .qgroup-head{margin-top:0}
    .qgroup-score{font-size:15px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:1px}
    .qgroup-score .us{color:var(--grn)}
    .qgroup .elog li{padding:8px 4px}
    .qgroup-empty{color:var(--txt2);font-size:13px;padding:8px 4px}
    /* Modal */
    .modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end}
    .toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:#1e293b;color:#f1f5f9;padding:11px 18px;border-radius:10px;font-size:14px;font-weight:600;z-index:300;max-width:88vw;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.4);transition:opacity .3s}
    .toast-ok{background:#166534;color:#dcfce7}
    .toast-err{background:#7f1d1d;color:#fee2e2}
    .toast-hide{opacity:0;pointer-events:none}
    .modal{background:var(--card);border-radius:22px 22px 0 0;padding:20px;width:100%;max-height:88vh;overflow-y:auto;padding-bottom:calc(20px + env(safe-area-inset-bottom))}
    .modal h3{font-size:18px;font-weight:800;margin-bottom:16px;text-align:center}
    .mopt{display:flex;align-items:center;gap:12px;padding:13px;border-radius:10px;border:2px solid var(--bdr);margin-bottom:8px;cursor:pointer;font-weight:600;font-size:15px;transition:all .15s}
    .mopt:active{transform:scale(.98)}
    .mopt.sel{border-color:var(--grn);background:var(--grnp)}
    .mopt-num{width:38px;height:38px;border-radius:50%;background:var(--blk);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0}
    .mopt-num-off{background:#9ca3af}
    .mopt-skip{border-style:dashed;justify-content:center;color:var(--txt2)}
    /* Toggle group */
    .tgl{display:flex;border:2px solid var(--bdr);border-radius:8px;overflow:hidden;margin-bottom:14px}
    .tgl button{flex:1;padding:11px;border:none;background:#fff;font-size:14px;font-weight:600;cursor:pointer;color:var(--txt2)}
    .tgl button.act{background:var(--grn);color:#fff}
    /* Live tabs */
    .ltabs{display:flex;background:#fff;border-top:2px solid var(--bdr);position:sticky;bottom:0;z-index:50}
    .ltab{flex:1;padding:11px 6px;text-align:center;cursor:pointer;font-size:11px;font-weight:700;color:var(--txt2);border:none;background:none}
    .ltab.act{color:var(--grn)}
    .ltab .ti{font-size:20px;display:block;margin-bottom:2px}
    /* Toast */
    #undo-toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:var(--txt);color:var(--bg);padding:10px 18px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.3);z-index:9100;max-width:88vw;text-align:center;display:flex;align-items:center;gap:8px;animation:splashFade .25s ease;pointer-events:none}
    /* FAB */
    .fab{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));right:24px;width:62px;height:62px;border-radius:31px;background:var(--org);color:#fff;border:none;font-size:30px;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:50}
    .fab:active{transform:scale(.9)}
    .fab-note{position:fixed;bottom:calc(56px + env(safe-area-inset-bottom) + 12px);right:14px;width:44px;height:44px;border-radius:22px;background:var(--card);border:2px solid var(--bdr);cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;z-index:49;padding:0;color:var(--txt)}
    .fab-note:active{transform:scale(.9)}
    .fab-note svg,.fab-mark svg{width:20px;height:20px;display:block}
    .fab-mark{position:fixed;bottom:calc(56px + env(safe-area-inset-bottom) + 68px);right:14px;width:44px;height:44px;border-radius:22px;background:var(--ylp,#fef9c3);border:2px solid var(--yl,#ca8a04);color:var(--yl,#ca8a04);cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;z-index:49;padding:0}
    .fab-mark:active{transform:scale(.9)}
    /* Player input row */
    .pirow{display:grid;grid-template-columns:56px 1fr 1fr auto;gap:6px;align-items:center;margin-bottom:6px}
    .pirow input,.pirow select{padding:10px;border:2px solid var(--bdr);border-radius:8px;font-size:15px;width:100%;-webkit-appearance:none;background:#fff}
    .pirow2{display:grid;grid-template-columns:1fr 70px;gap:6px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--bdr)}

<script>
// ===================== CONFIG =====================
const APP_VERSION = '0.2.7'; // MAJOR.MINOR.PATCH — 0.x = testfase, nog niet officieel live

};

const PERIOD_TYPES = {
  'helften': { count: 2, sing: 'Helft', plural: 'helften', abbr: 'H' },

function recomputeOnField(m) {
  const on = {}; m.players.forEach(p => on[p.id] = !!p.starting);
  for (const e of [...m.events].sort((a, b) => a.gameTimeMs - b.gameTimeMs)) {
    if (e.type === 'substitution') { if (e.playerOutId) on[e.playerOutId] = false; if (e.playerInId) on[e.playerInId] = true; }
    if (e.type === 'red_card' && e.playerId) on[e.playerId] = false;
    if (e.type === 'injury' && e.leavesField && e.playerId) on[e.playerId] = false;
  }
  m.players.forEach(p => p.onField = !!on[p.id]);
}

const DB_NAME = 'voetbal_db', DB_VER = 1;
let db;
function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(DB_NAME, DB_VER);
    r.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('matches')) d.createObjectStore('matches', { keyPath: 'id' });
    };
    r.onsuccess = e => res(e.target.result);
    r.onerror = e => rej(e.target.error);
  });
}
function dbAll() {
  return new Promise((res, rej) => {
    const r = db.transaction('matches','readonly').objectStore('matches').getAll();
    r.onsuccess = e => res(e.target.result.sort((a,b) => b.createdAt - a.createdAt));
    r.onerror = e => rej(e.target.error);
  });
}
function dbGet(id) {
  return new Promise((res, rej) => {
    const r = db.transaction('matches','readonly').objectStore('matches').get(id);
    r.onsuccess = e => res(e.target.result);
    r.onerror = e => rej(e.target.error);
  });
}
function dbSave(m) {
  m.updatedAt = Date.now();
  return new Promise((res, rej) => {
    const r = db.transaction('matches','readwrite').objectStore('matches').put(m);
    r.onsuccess = () => { cloudOnLocalMatchSave(m); res(); };
    r.onerror = e => rej(e.target.error);
  });
}
function dbDel(id) {
  return new Promise((res, rej) => {
    const r = db.transaction('matches','readwrite').objectStore('matches').delete(id);
    r.onsuccess = () => { cloudOnLocalMatchDelete(id); res(); };
    r.onerror = e => rej(e.target.error);
  });
}
// Lokaal schrijven ZONDER naar de cloud te pushen (gebruikt door de cloud-listener zelf).
function dbPutLocal(m) {
  return new Promise((res, rej) => {
    const r = db.transaction('matches','readwrite').objectStore('matches').put(m);
    r.onsuccess = () => res();
    r.onerror = e => rej(e.target.error);
  });
}
function dbDelLocal(id) {
  return new Promise((res, rej) => {
    const r = db.transaction('matches','readwrite').objectStore('matches').delete(id);
    r.onsuccess = () => res();
    r.onerror = e => rej(e.target.error);
  });
}

async function onAuthChanged(user) {
  if (window._hideSplash) window._hideSplash();
  currentUser = user;
  if (!user) {
    // Niet ingelogd → toon auth scherm (pending join blijft bewaard in localStorage)
    isAdmin = false; isGuest = false; viewerMode = false; activeTeamId = null; userTeams = {};
    ownerUid = null; isOwner = false; isApprovedAdmin = false; maintenanceActive = false;
    if (window._maintenanceOff) { window._maintenanceOff(); window._maintenanceOff = null; }
    stopTeamListeners(); listenAdminRequests();
    await go('auth', undefined, true); return;
  }
  // Anonieme gast
  if (user.isAnonymous) {
    isGuest = true; isAdmin = false;
    ownerUid = null; isOwner = false; isApprovedAdmin = false;
    // Pending join via QR/link afhandelen (ook voor een gast, zelfde als bij een ingelogde gebruiker)
    const pendingJoin = localStorage.getItem('voetbal_pending_join');
    if (pendingJoin) {
      localStorage.removeItem('voetbal_pending_join');
      const result = await joinTeamByToken(pendingJoin);
      if (result === 'ok') return;
      if (result === 'not_found') showToast('Code niet gevonden. Voer de code hieronder handmatig in.', 'err');
    }
    await loadUserTeams(user.uid);
    const teamIds = Object.keys(userTeams);
    if (teamIds.length === 0) { await go('guestjoin', undefined, true); return; }
    if (!activeTeamId || !userTeams[activeTeamId]) await selectTeam(teamIds[0]);
    return;
  }
  isGuest = false;
  // Ingelogd → laad eigenaar-status + ploegen van deze gebruiker
  await loadOwnerStatus(user);
  // Maintenance-listener pas hier registreren: gebruiker is nu authenticated,
  // anders annuleert Firebase de listener (auth != null regel) en herstelt die nooit.
  if (window._maintenanceOff) { window._maintenanceOff(); window._maintenanceOff = null; }
  await new Promise(resolve => {
    const mRef = fbdb.ref('maintenance/active');
    mRef.once('value', snap => { maintenanceActive = !!snap.val(); resolve(); });
    window._maintenanceOff = () => mRef.off('value');
    mRef.on('value', snap => {
      maintenanceActive = !!snap.val();
      if (view && view !== 'auth') {
        if (maintenanceActive && !isOwner) go('maintenance', undefined, true);
        else if (!maintenanceActive && view === 'maintenance') onAuthChanged(currentUser);
      }
    });
  });
  if (maintenanceActive && !isOwner) {
    await go('maintenance', undefined, true); return;
  }
  await loadUserTeams(user.uid);
  maybeNotifyApproved();
  maybeNotifyRejected();
  // Pending join via QR/link afhandelen
  const pendingJoin = localStorage.getItem('voetbal_pending_join');
  if (pendingJoin) {
    localStorage.removeItem('voetbal_pending_join');
    await joinTeamByToken(pendingJoin);
    return;
  }
  const teamIds = Object.keys(userTeams);
  if (teamIds.length === 0) {
    await go('teamselect', undefined, true); return;
  }
  if (teamIds.length === 1 && !activeTeamId) {
    await selectTeam(teamIds[0]); return;
  }
  if (!activeTeamId || !userTeams[activeTeamId]) {
    await preloadTeamNames();
    await go('teamselect', undefined, true); return;
  }
  updateCloudChip(); cloudRefreshUI();
}

// Eigenaar- en goedkeuringsstatus laden.
async function loadOwnerStatus(user) {
  ownerUid = null; isOwner = false; isApprovedAdmin = false;
  if (!user || !fbdb) { listenAdminRequests(); return; }
  try {
    ownerUid = (await fbdb.ref('owner').once('value')).val() || null;
    isOwner = !!(ownerUid && ownerUid === user.uid);
    if (isOwner) isApprovedAdmin = true;
    else isApprovedAdmin = !!(await fbdb.ref('approvedAdmins/' + user.uid).once('value')).val();
  } catch (e) { /* geen rechten / offline → standaard niet goedgekeurd */ }
  listenAdminRequests();
}

// Live meeluisteren naar openstaande aanvragen (enkel eigenaar) voor de teller.
function onAdminReqValue(s) {
  const v = s.val() || {};

function listenAdminRequests() {
  if (!fbdb) return;
  try { fbdb.ref('adminRequests').off('value', onAdminReqValue); } catch (e) {}
  pendingAdminCount = 0;
  if (isOwner) { try { fbdb.ref('adminRequests').on('value', onAdminReqValue); } catch (e) {} }
}

function onCoAdminReqValue(s) {
  const v = s.val() || {};

}
function listenCoAdminRequests() {
  if (!fbdb || !activeTeamId) return;

async function maybeNotifyRejected() {
  if (!currentUser || !fbdb) return;
  if (localStorage.getItem('voetbal_adminRequested') !== '1') return;
  if (isApprovedAdmin) return;
  try {
    const [rejSnap, reqSnap] = await Promise.all([
      fbdb.ref('rejectedAdmins/' + currentUser.uid).once('value'),
      fbdb.ref('adminRequests/' + currentUser.uid).once('value'),
    ]);
    const wasRejected = rejSnap.exists();
    const stillPending = reqSnap.exists();
    if (!wasRejected && stillPending) return; // aanvraag loopt nog
    // Opruimen
    if (wasRejected) await fbdb.ref('rejectedAdmins/' + currentUser.uid).remove().catch(() => {});
    localStorage.removeItem('voetbal_adminRequested');
    localStorage.removeItem('voetbal_adminApprovedSeen');
    if (wasRejected) {
      setTimeout(() => {
        openModal(`<h3>Aanvraag geweigerd</h3>
          <p style="text-align:center;color:var(--txt2);font-size:14px;margin-bottom:16px">Je aanvraag om beheerder te worden is geweigerd. Je kan een nieuwe aanvraag indienen als je dit wil.</p>

      const info = (memberInfoSnaps[i] && memberInfoSnaps[i].val()) || {};
      const clubName = (team.club && team.club.name) || tid;
      const uids = Object.keys(members).sort((a, b) =>
        (members[a] === 'admin' ? 0 : 1) - (members[b] === 'admin' ? 0 : 1));
      if (!uids.length) continue;

      const rows = uids.map(uid => {
        const role = members[uid];
        const mi = info[uid] || {};
        const naam = mi.name || '(onbekend)';
        const email = mi.email || '';
        const roleBadge = role === 'admin'
          ? `<span class="ts-role admin">${icI(IC.edit)} Co-beheerder</span>`
          : `<span class="ts-role viewer"><i class="ti ti-eye" style="font-size:1em;vertical-align:-.1em"></i> Kijker</span>`;
        return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bdr)">
          <span style="flex:1;font-size:14px"><b>${esc(naam)}</b><br><small style="color:var(--txt2)">${esc(email)}</small></span>
          ${roleBadge}
        </div>`;
      });

      html += `<div style="margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <span style="flex:1;font-size:12px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px">${esc(clubName)}</span>
          <button class="btn btn-red btn-sm" onclick="ownerDeleteTeam('${tid}','${esc(clubName)}')">Verwijderen</button>
        </div>
        ${rows.join('')}
      </div>`;
    }

    if (el) el.innerHTML = html;
  } catch (e) {
    console.error('showAllUsersModal fout:', e);
    if (el) el.innerHTML = `<p style="text-align:center;color:var(--org2)">Kon de gebruikers niet laden.<br><small>${e.message||e}</small></p>`;
  }
}

function ownerDeleteTeam(tid, naam) {

    <div class="auth-err" id="owndel-err"></div>

async function doOwnerDeleteTeam(tid) {
  if (!isOwner || !fbdb || !currentUser) return;
  const pwd = (document.getElementById('owndel-pwd') || {}).value || '';
  const err = document.getElementById('owndel-err');
  if (!pwd) { if (err) err.textContent = 'Geef je wachtwoord in.'; return; }
  if (err) err.textContent = 'Bezig...';
  try {
    const cred = firebase.auth.EmailAuthProvider.credential(currentUser.email, pwd);
    await currentUser.reauthenticateWithCredential(cred);
    const [teamSnap, memberInfoSnap] = await Promise.all([
      fbdb.ref('teams/' + tid).once('value'),
      fbdb.ref('memberInfo/' + tid).once('value'),
    ]);
    // Backup opslaan vóór verwijderen
    await fbdb.ref('deletedTeams/' + tid).set({
      deletedAt: Date.now(),
      deletedBy: currentUser.uid,
      deletedByEmail: currentUser.email || '',
      team: teamSnap.val(),
      memberInfo: memberInfoSnap.val(),
    });
    // Uitnodigingstoken direct verwijderen (een query over /invites is niet toegelaten door de rules)
    const token = ((teamSnap.val() || {}).info || {}).inviteToken;
    if (token) { try { await fbdb.ref('invites/' + token).remove(); } catch (e) {} }
    await Promise.all([
      fbdb.ref('teams/' + tid).remove(),
      fbdb.ref('memberInfo/' + tid).remove(),
      fbdb.ref('teamAdminRequests/' + tid).remove(),
    ]);
    showToast('Ploeg verwijderd.', 'ok');
    showAllUsersModal();
  } catch (e) {
    if (err) err.textContent = e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential'
      ? 'Ongeldig wachtwoord.' : (e.message || 'Verwijderen mislukt.');
  }
}

async function preloadTeamNames() {
  const ids = Object.keys(userTeams);
  await Promise.all(ids.map(async id => {
    if (teamNames[id]) return;
    try {
      const s = await fbdb.ref('teams/' + id + '/info/name').once('value');
      if (s.exists()) teamNames[id] = s.val();
    } catch (e) {}

async function loadUserTeams(uid) {
  const snap = await fbdb.ref('users/' + uid + '/teams').once('value');
  const raw = snap.val() || {};
  userTeams = {};
  await Promise.all(Object.keys(raw).map(async id => {
    try {
      const nameSnap = await fbdb.ref('teams/' + id + '/info/name').once('value');
      if (!nameSnap.exists()) {
        // Ploeg bestaat niet meer → opruimen
        fbdb.ref('users/' + uid + '/teams/' + id).remove().catch(() => {});
        return;
      }
      // Werkelijke rol ophalen; val terug op gecachede rol als de read faalt
      let role = raw[id];
      try {
        const roleSnap = await fbdb.ref('teams/' + id + '/members/' + uid).once('value');
        if (roleSnap.exists()) {
          role = roleSnap.val();
          if (role !== raw[id]) fbdb.ref('users/' + uid + '/teams/' + id).set(role).catch(() => {});
        }
      } catch (e) { /* geen toegang tot members-node: gecachede rol gebruiken */ }
      userTeams[id] = role;
    } catch (e) { /* netwerk- of permissiefout: ploeg overslaan maar NIET verwijderen */ }
  }));
}

// ---- schrijven (enkel admins van de actieve ploeg) ----
function cloudOnLocalMatchSave(m) {
  const r = teamRef('matches/' + m.id); if (!r || !isAdmin || !m || !m.id) return;
  try {
    const c = jclone(m);
    delete c.photo1; delete c.photo2; // base64 niet naar Firebase (te groot)
    // Notities gaan niet mee in "matches" (leesbaar door elk teamlid) maar apart naar
    // "teamNotes" (enkel beheerders) — zie notesRef().
    const playerNotes = {};
    (c.players || []).forEach(p => { if (p.note) playerNotes[p.id] = p.note; delete p.note; });
    delete c.notes;
    r.set(c);
    const nr = notesRef(m.id);
    if (nr) {
      if (m.notes || Object.keys(playerNotes).length) nr.set({ notes: m.notes || '', players: playerNotes });
      else nr.remove();
    }
  } catch (e) {}
}
function cloudOnLocalMatchDelete(id) {
  const r = teamRef('matches/' + id); if (!r || !isAdmin || !id) return;
  try { r.remove(); } catch (e) {}
  try { const nr = notesRef(id); if (nr) nr.remove(); } catch (e) {}
}
function cloudOnLocalTeamsSave(arr) {
  const r = teamRef('roster'); if (!r || !isAdmin) return;
  try { r.set(jclone(arr || [])); } catch (e) {}
}
function cloudOnLocalTournamentsSave(arr) {
  const r = teamRef('tournaments'); if (!r || !isAdmin) return;
  try { r.set(jclone(arr || [])); } catch (e) {}
}
function cloudOnLocalClubSave() {

  const theme = localStorage.getItem('voetbal_theme');
  try { r.set({ name: localStorage.getItem('voetbal_club_name') || '', logo: localStorage.getItem('voetbal_club_logo') || '', theme: theme || null }); } catch (e) {}
}

// ---- lezen ----
function stopTeamListeners() {
  for (const { ref, event } of teamListeners) { try { ref.off(event); } catch (e) {} }
  teamListeners = [];
  knownLiveMatchIds = new Set();
  knownScores = {};
}
function cloudListen() {
  if (!cloudReady || !activeTeamId) return;
  const addL = (path, event, fn) => {
    const r = teamRef(path); r.on(event, fn);
    teamListeners.push({ ref: r, event });
  };
  addL('matches', 'value', s => applyCloudMatches(s.val() || {}));
  addL('roster',  'value', s => applyCloudTeams(s.val() || []));
  addL('club',    'value', s => applyCloudClub(s.val()));
  addL('tournaments', 'value', s => applyCloudTournaments(s.val() || {}));
  // Notities enkel ophalen als beheerder (kijkers/gasten mogen dit pad sowieso niet lezen).
  if (isAdmin) {
    const nr = notesRef();
    if (nr) { nr.on('value', s => applyCloudNotes(s.val() || {})); teamListeners.push({ ref: nr, event: 'value' }); }
  }
}

function applyCloudClub(val) {
  if (!val) return;
  if (val.name) localStorage.setItem('voetbal_club_name', val.name);
  if (val.logo) localStorage.setItem('voetbal_club_logo', val.logo);
  if (val.theme) localStorage.setItem('voetbal_theme', val.theme); else localStorage.removeItem('voetbal_theme');
  applyStoredTheme();
  if (view === 'home' || view === 'setup') { go('home'); } else cloudRefreshUI();
}
async function applyCloudMatches(obj) {
  if (!db) return;
  const cloudIds = new Set(Object.keys(obj));
  const local = await dbAll();
  for (const m of local) { if (m.fromCloud && !cloudIds.has(m.id)) await dbDelLocal(m.id); }
  for (const id of cloudIds) {
    const m = obj[id]; if (!m) continue;
    m.id = id; m.fromCloud = true;
    if (!Array.isArray(m.events)) m.events = [];
    if (!Array.isArray(m.players)) m.players = [];
    if (!Array.isArray(m.quarters)) m.quarters = [];
    // Merge: lokale events die nog niet in de cloud zitten bewaren (co-admin conflict-fix)
    const existing = await dbGet(id);
    if (existing && Array.isArray(existing.events) && existing.events.length) {
      const cloudEventIds = new Set(m.events.map(e => e.id));
      const localOnly = existing.events.filter(e => e.id && !cloudEventIds.has(e.id));
      if (localOnly.length) {
        m.events = [...m.events, ...localOnly].sort((a, b) => (a.gameTimeMs ?? 0) - (b.gameTimeMs ?? 0));
        recomputeScore(m);
      }
    }
    // Notities zitten niet (meer) in het cloud-object (zie cloudOnLocalMatchSave) — lokaal bewaarde
    // notities overnemen zodat ze niet verdwijnen tot de aparte teamNotes-listener ze aanvult.
    if (existing) {
      if (existing.notes && m.notes === undefined) m.notes = existing.notes;
      if (Array.isArray(existing.players)) {
        const noteMap = new Map(existing.players.filter(p => p.note).map(p => [p.id, p.note]));
        if (noteMap.size) m.players.forEach(p => { if (noteMap.has(p.id)) p.note = noteMap.get(p.id); });
      }
    }
    await dbPutLocal(m);
    // Notificatie voor kijkers: toon eenmalig als wedstrijd live gaat
    if (!isAdmin && m.status === 'live' && !knownLiveMatchIds.has(id)) {
      knownLiveMatchIds.add(id);
      knownScores[id] = { us: m.scoreUs || 0, them: m.scoreThem || 0 };
      notifyLiveMatch(m);
    } else if (m.status !== 'live') {
      knownLiveMatchIds.delete(id);
      delete knownScores[id];
    } else if (!isAdmin && m.status === 'live' && knownScores[id]) {
      const prev = knownScores[id];
      const newUs = m.scoreUs || 0, newThem = m.scoreThem || 0;
      if (newUs > prev.us) notifyGoal(m, true, newUs, newThem);
      else if (newThem > prev.them) notifyGoal(m, false, newUs, newThem);
      knownScores[id] = { us: newUs, them: newThem };
    }
  }
  if (!isAdmin) knownLiveMatchIds.forEach(id => { if (!cloudIds.has(id)) knownLiveMatchIds.delete(id); });
  cloudRefreshUI();
}
// Notities komen via een apart, beheerder-only pad binnen (zie notesRef/database.rules.json)
// en worden hier teruggekoppeld naar de lokale match — nodig zodat een tweede beheerder
// (ander toestel) ze ook ziet, en na het wissen van lokale opslag.
async function applyCloudNotes(obj) {
  if (!db) return;
  for (const id of Object.keys(obj)) {
    const n = obj[id]; if (!n) continue;
    const existing = await dbGet(id); if (!existing) continue;
    existing.notes = n.notes || '';
    if (Array.isArray(existing.players) && n.players) {
      existing.players.forEach(p => { p.note = n.players[p.id] || ''; });
    }
    await dbPutLocal(existing);
  }
  cloudRefreshUI();
}
function notifyLiveMatch(m) {
  const club = getClubName() || 'je ploeg';
  const opp = m.opponent ? ` — ${m.opponent}` : '';
  const title = `⚽ Live: ${club}${opp}`;
  const body = 'De wedstrijd is gestart. Tik om te volgen.';
  if ('Notification' in window && Notification.permission === 'granted') {
    try { new Notification(title, { body, icon: 'logo.png', tag: 'live-' + m.id }); } catch (e) {}
  }
  // In-app banner als fallback (ook als notificaties geblokkeerd zijn)
  showLiveBanner(title, m.id);
}
function notifyGoal(m, scoredUs, newUs, newThem) {
  const club = getClubName() || tName(m);
  const home = !isAway(m);
  const usLabel = home ? club : m.opponent;
  const themLabel = home ? m.opponent : club;
  const usScore = home ? newUs : newThem;
  const themScore = home ? newThem : newUs;
  const title = scoredUs ? `⚽ GOAL! ${usLabel} ${usScore}–${themScore} ${themLabel}` : `⚽ Tegendoel — ${usLabel} ${usScore}–${themScore} ${themLabel}`;
  const body = scoredUs ? `${club} scoort!` : `${m.opponent} scoort.`;
  if ('Notification' in window && Notification.permission === 'granted') {
    try { new Notification(title, { body, icon: 'logo.png', tag: 'goal-' + m.id, renotify: true }); } catch (e) {}
  }
  showGoalBanner(title, m.id, scoredUs);
}
function showGoalBanner(title, matchId, scoredUs) {
  let banner = document.getElementById('goal-notify-banner');
  if (!banner) {
    banner = document.createElement('div');
    banner.id = 'goal-notify-banner';
    document.body.appendChild(banner);
  }
  banner.style.cssText = `position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:${scoredUs ? '#2f9e57' : '#dc2626'};color:#fff;padding:10px 18px;border-radius:12px;font-size:14px;font-weight:700;box-shadow:0 4px 16px rgba(0,0,0,.35);z-index:9000;cursor:pointer;max-width:320px;text-align:center;animation:splashFade .3s ease`;
  banner.textContent = title;
  banner.onclick = () => { banner.remove(); if (view !== 'live') go('live', matchId); };
  clearTimeout(banner._t);
  banner._t = setTimeout(() => banner && banner.remove(), 8000);
}
function showLiveBanner(title, matchId) {
  if (view === 'live' && match && match.id === matchId) return; // al op live scherm
  let banner = document.getElementById('live-notify-banner');
  if (!banner) {
    banner = document.createElement('div');
    banner.id = 'live-notify-banner';
    banner.style.cssText = 'position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:#2f9e57;color:#fff;padding:10px 18px;border-radius:12px;font-size:14px;font-weight:700;box-shadow:0 4px 16px rgba(0,0,0,.35);z-index:9000;cursor:pointer;display:flex;align-items:center;gap:10px;max-width:320px;text-align:center;animation:splashFade .3s ease';
    document.body.appendChild(banner);
  }
  banner.innerHTML = `<span>${title}</span><span style="font-size:11px;opacity:.8">Tik om te volgen</span>`;
  banner.onclick = () => { banner.remove(); go('live', matchId); };
  clearTimeout(banner._t);
  banner._t = setTimeout(() => banner && banner.remove(), 12000);
}
function applyCloudTeams(val) {
  const raw = Array.isArray(val) ? val : Object.values(val || {});
  // Firebase slaat [] op als null — normaliseer terug naar array, filter nulls
  const cloud = raw.filter(t => t && t.id).map(t => Object.assign({}, t, {
    players: Array.isArray(t.players) ? t.players : [],
    trainers: Array.isArray(t.trainers) ? t.trainers : [],
    fromCloud: true
  }));
  const cloudIds = new Set(cloud.map(t => t && t.id).filter(Boolean));
  const merged = cloud; // in cloud-modus enkel cloud-ploegen bewaren
  localStorage.setItem('voetbal_teams_v2', JSON.stringify(merged));
  cloudRefreshUI();
}
function applyCloudTournaments(val) {
  const cloud = Array.isArray(val) ? val : Object.values(val || {});
  const cloudIds = new Set(cloud.map(t => t && t.id).filter(Boolean));
  const localOnly = getTournaments().filter(t => !t.fromCloud && !cloudIds.has(t.id));
  const merged = localOnly.concat(cloud.map(t => Object.assign({}, t, { fromCloud: true })));
  localStorage.setItem('voetbal_tournaments', JSON.stringify(merged));
  cloudRefreshUI();
}

function cloudRefreshUI() {
  if (view === 'home') loadHome();
  else if (view === 'matches') loadMatches();
  else if (view === 'stats' && typeof loadStats === 'function') loadStats();
  else if (view === 'teams') render();
  else if (view === 'tournaments') render();
  else if (view === 'tournament') loadTournamentDetail();
  else if ((view === 'detail' || view === 'live' || view === 'prep') && match && !isAdmin) {
    dbGet(match.id).then(m => { if (m) { match = m; render(); } });
  }
}

    </div>` : '';

  return `<div class="hdr"><button class="back" onclick="go(_beheerFrom||'home')">‹</button><h1>${icI(IC.edit)} Beheer</h1></div>
  <div class="content">
    ${ownerBlock}

// ---- Ploeg aanmaken ----
async function createTeam(name) {
  if (!currentUser || !fbdb) return;
  name = (name || '').trim(); if (!name) return;
  const teamId = fbdb.ref('teams').push().key;
  const uid = currentUser.uid;
  const token = Math.random().toString(36).slice(2, 8).toUpperCase();
  const initialRosterId = fbdb.ref('teams/' + teamId + '/roster').push().key;
  await fbdb.ref('teams/' + teamId).set({
    info: { name, createdBy: uid, createdAt: Date.now(), inviteToken: token },
    members: { [uid]: 'admin' },
    club: { name, logo: '', theme: null },
    roster: { [initialRosterId]: { id: initialRosterId, name, players: [], trainers: [], fromCloud: true } }
  });
  // Sla uitnodigingstoken ook op als directe lookup (geen query nodig bij vervoegen)
  await fbdb.ref('invites/' + token).set({ teamId, createdBy: uid, createdAt: Date.now() });
  await fbdb.ref('users/' + uid + '/teams/' + teamId).set('admin');
  userTeams[teamId] = 'admin';
  await selectTeam(teamId);
}

// ---- Ploeg vervoegen via uitnodigingscode ----
async function joinTeamByToken(token) {
  if (!currentUser || !fbdb) return null;
  token = (token || '').trim().toUpperCase();
  // Directe lookup via /invites/{token} — geen query nodig
  const snap = await fbdb.ref('invites/' + token).once('value');
  if (!snap.exists()) return 'not_found';
  const teamId = snap.val().teamId;
  if (!teamId) return 'not_found';
  const uid = currentUser.uid;
  const existing = await fbdb.ref('teams/' + teamId + '/members/' + uid).once('value');
  if (!existing.exists()) {
    await fbdb.ref('teams/' + teamId + '/members/' + uid).set('viewer');
    await fbdb.ref('users/' + uid + '/teams/' + teamId).set('viewer');
    userTeams[teamId] = 'viewer';
  } else {
    const role = existing.val();
    userTeams[teamId] = role;
    // Cache herstellen (kan leeg zijn na een bug of herinstallatie)
    await fbdb.ref('users/' + uid + '/teams/' + teamId).set(role).catch(() => {});
  }
  await selectTeam(teamId);
  return 'ok';
}

// ---- Uitnodigingslink tonen ----
async function showInviteModal(teamId) {
  // Bepaal welke ploeg: meegegeven of actieve ploeg
  const tid = teamId || activeTeamId;
  if (!tid) return;

  // Als beheerder meerdere ploegen heeft, toon eerst een keuze
  const adminTeams = Object.entries(userTeams).filter(([, role]) => role === 'admin');
  if (!teamId && !activeTeamId && adminTeams.length > 1) {
    // Laad namen van alle beheerde ploegen
    openModal(`<h3>${icI(IC.link)} Kies een ploeg</h3>
      <p style="text-align:center;color:var(--txt2);font-size:13px;margin-bottom:12px">Voor welke ploeg wil je de uitnodigingscode delen?</p>
      <div id="invite-team-list"><p style="text-align:center;color:var(--txt2)">Laden...</p></div>
      <button class="btn btn-gray" style="margin-top:8px" onclick="closeModal()">Annuleren</button>`);
    const listEl = document.getElementById('invite-team-list');
    if (listEl) {
      const items = await Promise.all(adminTeams.map(async ([id]) => {
        const s = await fbdb.ref('teams/' + id + '/info/name').once('value');
        return { id, name: s.val() || id };
      }));
      if (listEl) listEl.innerHTML = items.map(t =>
        `<button class="btn btn-pale" style="margin-bottom:8px" onclick="showInviteModal('${t.id}')">${esc(t.name)}</button>`
      ).join('');
    }
    return;
  }

  // Haal token op en zorg dat het ook in /invites/ staat
  const infoSnap = await fbdb.ref('teams/' + tid + '/info').once('value');
  const info = infoSnap.val() || {};
  const token = info.inviteToken || '???';
  const teamName = info.name || 'Ploeg';

  // Zorg dat /invites/{token} bestaat (voor ploegen aangemaakt vóór deze fix)
  const invSnap = await fbdb.ref('invites/' + token).once('value');
  if (!invSnap.exists() && currentUser) {
    await fbdb.ref('invites/' + token).set({ teamId: tid, createdBy: currentUser.uid, createdAt: Date.now() });
  }

  const joinUrl = 'https://timbuyse.github.io/MatchDelegate/?join=' + token;
  const qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=180x180&ecc=M&data=' + encodeURIComponent(joinUrl);
  const shareText = 'Volg ' + teamName + ' via Match Delegate. Open de link of gebruik code ' + token + '.';
  openModal(`<h3>${icI(IC.link)} Uitnodiging — ${esc(teamName)}</h3>
    <p style="text-align:center;color:var(--txt2);font-size:13px;margin-bottom:12px">Scan de QR-code of deel de link. Werkt ook voor mensen zonder account.</p>
    <div style="display:flex;justify-content:center;margin-bottom:12px">
      <img src="${qrUrl}" width="180" height="180" style="border-radius:10px;background:#fff;padding:6px" alt="QR-code uitnodiging">
    </div>
    <div class="invite-code" style="margin-bottom:8px">${token}</div>
    <button class="btn btn-green" onclick="(navigator.share ? navigator.share({title:'Match Delegate',url:'${joinUrl}',text:'${shareText.replace(/'/g,"\\'")}'}):navigator.clipboard.writeText('${joinUrl}').then(()=>showToast('Link gekopieerd!','ok')))">${icI(IC.share)} Delen / Link kopiëren</button>
    <button class="btn btn-gray" style="margin-top:8px" onclick="closeModal()">Sluiten</button>`);
}

async function requestCoAdmin() {
  const tid = activeTeamId;
  if (!tid || !currentUser || !fbdb) return;
  const ref = fbdb.ref('teamAdminRequests/' + tid + '/' + currentUser.uid);
  const snap = await ref.once('value');
  if (snap.exists()) { showToast('Je aanvraag is al verstuurd. Wacht op goedkeuring van de beheerder.', 'err'); return; }
  try {
    await ref.set({ name: currentUser.displayName || '', email: currentUser.email || '', requestedAt: Date.now() });
    showToast('Aanvraag verstuurd. De beheerder ontvangt een melding.', 'ok');
  } catch (e) { showToast('Aanvraag mislukt: ' + (e.message || 'probeer opnieuw.'), 'err'); }

// ---- Kijkers van de actieve ploeg tonen (enkel beheerder) ----
async function showMembersModal() {
  const tid = activeTeamId;
  if (!tid || !isAdmin) return;
  const teamName = getClubName() || 'deze ploeg';
  openModal(`<h3>${icI(IC.players)} Leden — ${esc(teamName)}</h3>
    <div id="members-list"><p style="text-align:center;color:var(--txt2)">Laden...</p></div>
    <button class="btn btn-gray" style="margin-top:10px" onclick="closeModal()">Sluiten</button>`);
  try {
    const [miSnap, memSnap, reqSnap] = await Promise.all([
      fbdb.ref('memberInfo/' + tid).once('value'),
      fbdb.ref('teams/' + tid + '/members').once('value'),
      fbdb.ref('teamAdminRequests/' + tid).once('value'),
    ]);
    const info = miSnap.val() || {};
    const members = memSnap.val() || {};
    const requests = reqSnap.val() || {};
    // Haal ontbrekende memberInfo op via users-node (enkel voor leden zonder info)
    const missingUids = Object.keys(members).filter(u => !info[u]);
    await Promise.all(missingUids.map(async u => {
      try {
        const s = await fbdb.ref('users/' + u).once('value');
        const d = s.val();
        if (d) info[u] = { name: d.displayName || d.name || '', email: d.email || '' };
      } catch (e) {}
    }));
    // Sorteer: beheerders eerst, dan kijkers
    const uids = Object.keys(members).sort((a, b) =>
      (members[a] === 'admin' ? 0 : 1) - (members[b] === 'admin' ? 0 : 1));
    const rows = uids.map(uid => {
      const role = members[uid];
      const mi = info[uid] || {};
      const naam = mi.name || '(naam nog niet gekend)';
      const email = mi.email || '(e-mail nog niet gekend)';
      const badge = role === 'admin'
        ? `<span class="ts-role admin">${icI(IC.edit)} Beheerder</span>`
        : '<span class="ts-role viewer"><i class="ti ti-eye" style="font-size:1em;vertical-align:-.1em"></i> Kijker</span>';
      const btns = role !== 'admin'
        ? `<button class="btn btn-pale btn-sm" onclick="promoteMember('${uid}')">Maak beheerder</button>
           <button class="btn btn-red btn-sm" onclick="removeMember('${uid}')">Verwijderen</button>`
        : (uid !== currentUser?.uid
          ? `<button class="btn btn-gray btn-sm" onclick="demoteMember('${uid}')">Maak kijker</button>`
          : '');
      return `<div class="ts-team-row" style="cursor:default;flex-direction:column;align-items:stretch;gap:8px">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="flex:1;font-size:15px;font-weight:700"><b>${esc(naam)}</b><br><small style="color:var(--txt2);font-weight:400">${esc(email)}</small></span>
          ${badge}
        </div>
        ${btns ? `<div style="display:flex;gap:6px;flex-wrap:wrap">${btns}</div>` : ''}
      </div>`;
    });
    // Openstaande aanvragen
    const reqUids = Object.keys(requests).filter(u => !members[u] || members[u] !== 'admin');
    const reqRows = reqUids.map(uid => {
      const r = requests[uid];
      const naam = r.name || '(geen naam)';
      const email = r.email || '';
      return `<div class="ts-team-row" style="cursor:default;border-left:3px solid var(--org);flex-direction:column;align-items:stretch;gap:8px">
        <div><b>${esc(naam)}</b><br><small style="color:var(--txt2)">${esc(email)}</small><br><small style="color:var(--org)">Vraagt co-beheer aan</small></div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-green btn-sm" onclick="approveCoAdmin('${uid}')">Goedkeuren</button>
          <button class="btn btn-red btn-sm" onclick="rejectCoAdmin('${uid}')">Weigeren</button>
        </div>
      </div>`;
    });
    const viewers = uids.filter(u => members[u] !== 'admin').length;
    const el = document.getElementById('members-list');
    if (el) el.innerHTML =
      (reqRows.length ? `<p style="font-size:12px;font-weight:700;color:var(--org);margin-bottom:6px">OPENSTAANDE AANVRAGEN</p>${reqRows.join('')}<hr style="margin:10px 0">` : '')
      + (rows.length ? rows.join('') : '<p style="text-align:center;color:var(--txt2)">Nog niemand vervoegd.</p>')
      + `<p style="text-align:center;color:var(--txt2);font-size:12px;margin-top:10px">${viewers} kijker${viewers===1?'':'s'} · ${uids.filter(u=>members[u]==='admin').length} beheerder${uids.filter(u=>members[u]==='admin').length===1?'':'s'}</p>`;
  } catch (e) {
    console.error('Leden laden mislukt:', e);
    const el = document.getElementById('members-list');
    if (el) el.innerHTML = '<p style="text-align:center;color:var(--org2)">Kon de lijst niet laden.</p>';
  }
}

async function approveCoAdmin(uid) {
  const tid = activeTeamId;
  if (!isAdmin || !tid || !fbdb) return;
  try {
    await fbdb.ref('teams/' + tid + '/members/' + uid).set('admin');
    await fbdb.ref('teamAdminRequests/' + tid + '/' + uid).remove();
    showMembersModal();
  } catch (e) { showToast('Goedkeuren mislukt: ' + (e.message || 'probeer opnieuw.'), 'err'); }
}

async function rejectCoAdmin(uid) {
  const tid = activeTeamId;
  if (!isAdmin || !tid || !fbdb) return;
  try {
    await fbdb.ref('teamAdminRequests/' + tid + '/' + uid).remove();
    showMembersModal();
  } catch (e) { showToast('Weigeren mislukt: ' + (e.message || 'probeer opnieuw.'), 'err'); }
}

async function demoteMember(uid) {

      showMembersModal();

}

async function promoteMember(uid) {
  if (!isAdmin || !activeTeamId || !fbdb) return;
  showConfirm('Wil je deze persoon promoveren tot mede-beheerder? Ze kunnen dan wedstrijden aanmaken en bewerken.', async () => {
    try {
      await fbdb.ref('teams/' + activeTeamId + '/members/' + uid).set('admin');
      showMembersModal();
    } catch (e) { showToast('Promoveren mislukt: ' + (e.message || 'probeer opnieuw.'), 'err'); }
  }, 'Promoveren', 'btn-green');
}
async function removeMember(uid) {
  if (!isAdmin || !activeTeamId || !fbdb) return;
  showConfirm('Ben je zeker dat je deze kijker wil verwijderen? Ze verliezen toegang tot de ploeg.', async () => {
    try {
      await fbdb.ref('teams/' + activeTeamId + '/members/' + uid).remove();

      fbdb.ref('users/' + uid + '/teams/' + activeTeamId).remove().catch(() => {});
      showMembersModal();
    } catch (e) { showToast('Verwijderen mislukt: ' + (e.message || 'probeer opnieuw.'), 'err'); }
  }, 'Verwijderen');
}

function authSwitchTab(t) {
  document.getElementById('tab-login').classList.toggle('act', t === 'login');
  document.getElementById('tab-register').classList.toggle('act', t === 'register');
  document.getElementById('auth-login-form').style.display = t === 'login' ? '' : 'none';
  document.getElementById('auth-register-form').style.display = t === 'register' ? '' : 'none';
}

function authDoLogin() {
  const email = (document.getElementById('auth-email') || {}).value || '';
  const pwd = (document.getElementById('auth-pwd') || {}).value || '';
  const err = document.getElementById('auth-err');
  if (err) err.textContent = 'Bezig...';
  fbauth.signInWithEmailAndPassword(email, pwd)
    .then(() => { if (err) err.textContent = ''; })
    .catch(e => { if (err) err.textContent = authErrMsg(e.code); });
}

function authForgotPassword() {
  const email = (document.getElementById('auth-email') || {}).value || '';
  if (!email) { showToast('Vul eerst je e-mailadres in.', 'err'); return; }
  fbauth.sendPasswordResetEmail(email)
    .then(() => showToast('Resetmail verstuurd naar ' + email + '. Controleer ook je spammap.', 'ok'))
    .catch(e => showToast(authErrMsg(e.code), 'err'));
}

async function authDoRegister() {
  const name = (document.getElementById('reg-name') || {}).value || '';
  const email = (document.getElementById('reg-email') || {}).value || '';
  const pwd = (document.getElementById('reg-pwd') || {}).value || '';
  const pwd2 = (document.getElementById('reg-pwd2') || {}).value || '';
  const err = document.getElementById('reg-err');
  if (!name.trim()) { if (err) err.textContent = 'Geef je naam in.'; return; }
  if (pwd.length < 6) { if (err) err.textContent = 'Wachtwoord moet minstens 6 tekens zijn.'; return; }
  if (pwd !== pwd2) { if (err) err.textContent = 'De twee wachtwoorden zijn niet gelijk.'; return; }
  if (err) err.textContent = 'Bezig...';
  try {
    const cred = await fbauth.createUserWithEmailAndPassword(email, pwd);
    await cred.user.updateProfile({ displayName: name.trim() });
    await fbdb.ref('users/' + cred.user.uid).set({ email, displayName: name.trim(), createdAt: Date.now() });
    if (err) err.textContent = '✓ Account aangemaakt!';
  } catch (e) { if (err) err.textContent = authErrMsg(e.code); }
}

function authErrMsg(code) {
  const map = {
    'auth/user-not-found': 'Geen account gevonden met dit e-mailadres.',
    'auth/wrong-password': 'Onjuist wachtwoord.',
    'auth/invalid-email': 'Ongeldig e-mailadres.',
    'auth/email-already-in-use': 'Dit e-mailadres is al in gebruik.',
    'auth/weak-password': 'Wachtwoord moet minstens 6 tekens zijn.',
    'auth/invalid-credential': 'Onjuist e-mailadres of wachtwoord.',
    'auth/too-many-requests': 'Te veel pogingen. Probeer later opnieuw.',
  };

// ===================== STATE =====================
let view = 'home', match = null, tab = 'wedstrijd', timerInt = null, _settingsFrom = 'home', _beheerFrom = 'home';

// ===================== UTILS =====================
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function pFirstName(p) { return p.firstName !== undefined ? p.firstName : (p.name || '').split(' ')[0]; }
function pLastName(p) { return p.lastName !== undefined ? p.lastName : _lastName(p.name || ''); }
function fmtTime(ms) {
  const s = Math.floor(Math.max(0,ms) / 1000);
  return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}
function fmtDate(ts) { return new Date(ts).toLocaleDateString('nl-BE',{day:'numeric',month:'long',year:'numeric'}); }
function matchWhen(m) {
  const d = m.date ? new Date(m.date + 'T00:00:00').getTime() : m.createdAt;
  return fmtDate(d) + (m.time ? ' · ' + m.time : '');
}
function getGameTimeMs(m) {
  let t = 0;
  for (const q of m.quarters) {
    if (q.endTime) t += q.endTime - q.startTime - (q.totalPaused || 0);
    else if (q.startTime) t += (q.pausedAt ? q.pausedAt : Date.now()) - q.startTime - (q.totalPaused || 0);
  }
  return Math.max(0, t);
}
function getQElapsed(m) {
  const q = m.quarters[m.quarters.length - 1];
  if (!q || !q.startTime) return 0;
  const ref = q.endTime ? q.endTime : (q.pausedAt ? q.pausedAt : Date.now());
  return Math.max(0, ref - q.startTime - (q.totalPaused || 0));
}
function gameMin(ms) { return Math.floor(ms / 60000) + 1; }
// Cumulatieve werkelijke speeltijd vóór het begin van kwart qNum.
function gameTimeMsAtStartOfQuarter(m, qNum) {
  let t = 0;
  for (const q of [...m.quarters].sort((a,b) => a.num - b.num)) {
    if (q.num >= qNum) break;
    if (q.endTime && q.startTime) t += q.endTime - q.startTime - (q.totalPaused || 0);
    else t += (m.quarterDuration || 15) * 60000;
  }
  return t;
}
// Minuut binnen het kwart (reset naar 1 bij elk nieuw kwart).
function eventMin(e, m) {
  if (!e.quarterNum) return gameMin(e.gameTimeMs);
  const actualStart = gameTimeMsAtStartOfQuarter(m, e.quarterNum);
  const withinQuarter = Math.max(0, e.gameTimeMs - actualStart);
  return Math.floor(withinQuarter / 60000) + 1;
}
// Globale voetbaltijd voor de samenvatting: extra time als "45' + 1'", nieuwe kwarten starten na nominale duur.
function eventMinGlobal(e, m) {
  if (!e.quarterNum) { const min = gameMin(e.gameTimeMs); return { min, extra: 0 }; }
  const nomMs = (m.quarterDuration || 15) * 60000;
  const nomStartMs = (e.quarterNum - 1) * nomMs;
  const actualStart = gameTimeMsAtStartOfQuarter(m, e.quarterNum);
  const withinQ = Math.max(0, e.gameTimeMs - actualStart);
  if (withinQ <= nomMs) {
    return { min: Math.floor((nomStartMs + withinQ) / 60000) + 1, extra: 0 };
  } else {
    const nomEndMin = Math.floor((nomStartMs + nomMs) / 60000);
    const extraMin = Math.ceil((withinQ - nomMs) / 60000);
    return { min: nomEndMin, extra: extraMin };
  }
}
function eventMinSummaryText(e, m) {
  const { min, extra } = eventMinGlobal(e, m);
  return extra > 0 ? `${min}' + ${extra}'` : `${min}'`;
}
function eventMinLocal(e, m) {
  if (!e.quarterNum) return `${gameMin(e.gameTimeMs)}'`;
  const nomMs = (m.quarterDuration || 15) * 60000;
  const actualStart = gameTimeMsAtStartOfQuarter(m, e.quarterNum);
  const withinQ = Math.max(0, e.gameTimeMs - actualStart);
  if (withinQ <= nomMs) return `${Math.floor(withinQ / 60000) + 1}'`;
  const extraMin = Math.ceil((withinQ - nomMs) / 60000);
  return `${m.quarterDuration || 15}'+${extraMin}'`;
}
function playersOnField(m) { return m.players.filter(p => p.onField && !p.absent); }
function playersOnBench(m) { return m.players.filter(p => !p.onField && !p.absent); }
// Bij retroactief event: spelers op het veld/bank at het begin van het geselecteerde kwart.
function playersOnFieldForEvent(m) {
  if (_postEventQuarter != null) return playersAtPeriodStart(m, _postEventQuarter);
  return playersOnField(m);
}
function playersOnBenchForEvent(m) {
  if (_postEventQuarter != null) {
    const onIds = new Set(playersAtPeriodStart(m, _postEventQuarter).map(p => p.id));
    return m.players.filter(p => !onIds.has(p.id));
  }
  return playersOnBench(m);
}
// Veldbezetting inclusief reeds ingeplande pauzewissels (voor het plannen van meerdere wissels op rij).
function effectiveOnField(m) {
  const on = new Set(m.players.filter(p => p.onField).map(p => p.id));
  for (const s of (m.pendingSubs || [])) { on.delete(s.outId); on.add(s.inId); }
  return m.players.filter(p => on.has(p.id));
}

function calcMinutes(m) {
  const mins = {}, totalMs = getGameTimeMs(m), entry = {};
  for (const p of m.players) mins[p.id] = { ms: 0, absent: !!p.absent };
  for (const p of m.players) if (p.starting && !p.absent) entry[p.id] = 0;
  const evts = [...m.events].sort((a,b) => a.gameTimeMs - b.gameTimeMs);
  for (const e of evts) {
    if (e.type === 'substitution') {
      if (entry[e.playerOutId] !== undefined) { mins[e.playerOutId].ms += e.gameTimeMs - entry[e.playerOutId]; delete entry[e.playerOutId]; }
      entry[e.playerInId] = e.gameTimeMs;
    }
    if (e.type === 'red_card' && entry[e.playerId] !== undefined) {
      mins[e.playerId].ms += e.gameTimeMs - entry[e.playerId]; delete entry[e.playerId];
    }
    // Blessure waarbij de speler het veld verlaat zonder directe wissel: stop de teller.
    if (e.type === 'injury' && e.leavesField && entry[e.playerId] !== undefined) {

function calcMinutesPerQuarter(m) {

  if (qNums.length < 2) return null;
  const totalMs = getGameTimeMs(m);
  const qBounds = qNums.map((qNum, i) => {
    const start = gameTimeMsAtStartOfQuarter(m, qNum);
    const end = i + 1 < qNums.length ? gameTimeMsAtStartOfQuarter(m, qNums[i + 1]) : totalMs;
    return { qNum, start, end };

  const intervals = {};
  for (const p of m.players) intervals[p.id] = [];
  const entry = {};
  for (const p of m.players) if (p.starting) entry[p.id] = 0;
  const evts = [...m.events].sort((a, b) => a.gameTimeMs - b.gameTimeMs);
  for (const e of evts) {
    if (e.type === 'substitution') {
      if (entry[e.playerOutId] !== undefined) { intervals[e.playerOutId].push({ start: entry[e.playerOutId], end: e.gameTimeMs }); delete entry[e.playerOutId]; }
      entry[e.playerInId] = e.gameTimeMs;
    }
    if (e.type === 'red_card' && entry[e.playerId] !== undefined) { intervals[e.playerId].push({ start: entry[e.playerId], end: e.gameTimeMs }); delete entry[e.playerId]; }
    if (e.type === 'injury' && e.leavesField && entry[e.playerId] !== undefined) { intervals[e.playerId].push({ start: entry[e.playerId], end: e.gameTimeMs }); delete entry[e.playerId]; }
  }
  for (const [pid, ms] of Object.entries(entry)) if (intervals[pid]) intervals[pid].push({ start: ms, end: totalMs });
  const result = {};
  for (const p of m.players) {
    result[p.id] = {};
    for (const { qNum, start: qs, end: qe } of qBounds) {
      let ms = 0;
      for (const { start, end } of intervals[p.id]) ms += Math.max(0, Math.min(end, qe) - Math.max(start, qs));

}

function pName(m, id){ const p = m.players.find(x=>x.id===id); return p ? p.name : '?'; }

function startTimer() {
  stopTimer();
  timerInt = setInterval(() => { if (view === 'live') updateTimerDisplay(); }, 500);
}
function stopTimer() { if (timerInt) { clearInterval(timerInt); timerInt = null; } }
// Scherm wakker houden tijdens een lopend deel
let wakeLock = null;
async function requestWake() { try { if ('wakeLock' in navigator && !wakeLock) { wakeLock = await navigator.wakeLock.request('screen'); wakeLock.addEventListener('release', () => { wakeLock = null; }); } } catch (e) {} }
async function releaseWake() { try { if (wakeLock) await wakeLock.release(); } catch (e) {} wakeLock = null; }
// Eindsignaal (geluid + trilling)
function beep() {
  try {
    const AC = window.AudioContext || window.webkitAudioContext; const ac = new AC();
    const o = ac.createOscillator(), g = ac.createGain(); o.connect(g); g.connect(ac.destination);
    o.type = 'sine'; o.frequency.value = 880;
    g.gain.setValueAtTime(0.001, ac.currentTime); g.gain.exponentialRampToValueAtTime(0.4, ac.currentTime + 0.02); g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.7);
    o.start(); o.stop(ac.currentTime + 0.72);
  } catch (e) {}
  try { if (navigator.vibrate) navigator.vibrate([250, 120, 250]); } catch (e) {}
}
function countdownOn() { return localStorage.getItem('voetbal_countdown') === '1'; }
function toggleCountdown() { localStorage.setItem('voetbal_countdown', countdownOn() ? '0' : '1'); render(); }
// Eenvoudige modus: toont enkel de meest gebruikte eventknoppen (Goal, Wissel, Kaart, Blessure).
// Standaard AAN — minder drempel voor een ouder/afgevaardigde die niet elke actie kent.
function simpleEventsOn() { return localStorage.getItem('voetbal_simple_events') !== '0'; }
function toggleSimpleEvents() { localStorage.setItem('voetbal_simple_events', simpleEventsOn() ? '0' : '1'); render(); }
function timerText(m) {
  const elapsed = getQElapsed(m), durMs = (m.quarterDuration || 0) * 60000;
  if (durMs && elapsed >= durMs) return fmtTime(durMs) + ' + ' + fmtTime(elapsed - durMs);
  if (countdownOn() && durMs) return '-' + fmtTime(durMs - elapsed);
  return fmtTime(elapsed);
}
function updateTimerDisplay() {
  const el = document.getElementById('timer-time'), lb = document.getElementById('timer-lbl');
  if (!el || !match) return;
  const q = match.quarters[match.quarters.length - 1];
  const elapsed = getQElapsed(match);
  const durMs = (match.quarterDuration || 0) * 60000;
  const isRunning = q && q.startTime && !q.pausedAt && !q.endTime;
  const overtime = isRunning && durMs && elapsed >= durMs;
  if (isRunning && durMs && elapsed >= durMs && q && !q.alerted) { q.alerted = true; beep(); dbSave(match); }
  el.textContent = timerText(match);
  el.style.color = overtime ? 'var(--org)' : '';
  if (lb) {
    const isPaused = q && q.pausedAt;
    if (lb) lb.textContent = isPaused ? 'GEPAUZEERD' : (overtime ? '⏰ tijd voorbij' : '');
  }
  const bar = document.getElementById('timer-progress-bar');
  if (bar && durMs) {
    const pct = Math.min(100, (elapsed / durMs) * 100).toFixed(1);
    bar.style.width = pct + '%';
    bar.style.background = overtime ? 'var(--org)' : 'var(--grn)';
  }
}

function shortName(name) {
  if (!name) return '';
  const parts = name.trim().split(/\s+/);
  if (parts.length === 1) return name;
  const last = parts[parts.length - 1];
  const firsts = parts.slice(0, -1).join(' ');
  const initials = firsts.split(/[\s-]+/).filter(Boolean).map(p => p[0].toUpperCase() + '.').join('');
  return initials + ' ' + last;
}
// Achternaam = alles na het eerste woord (voornaam), incl. tussenvoegsel (De, Van, ...).
function _lastName(name) {
  if (!name) return '';
  const parts = name.trim().split(/\s+/);
  return parts.length > 1 ? parts.slice(1).join(' ') : parts[0];
}
// Map van speler-id → veldnaam: enkel achternaam, met initiaal als er duplicaten zijn.
function fieldDisplayNames(players) {
  const lastNames = players.map(p => _lastName(p.name || ''));
  return new Map(players.map((p, i) => {
    const ln = lastNames[i];
    const isDup = lastNames.filter(l => l.toLowerCase() === ln.toLowerCase()).length > 1;
    const initial = isDup ? ((p.name||'').trim()[0]||'').toUpperCase() + '. ' : '';
    return [p.id, initial + ln];
  }));
}

function pitchDot(m, p, x, y, dn, captainId) {
  const capId = captainId !== undefined ? captainId : (m ? m.captainId : null);
  const cap = (capId === p.id) ? ' ©' : '';
  const lbl = `${esc(dn || _lastName(p.name))}${cap}`;
  return `<div class="pdot ${p.line==='Doel'?'pdot-org':''}" style="left:${x}%;top:${y}%">

function renderPitch(m, players, captainId) {
  const dns = fieldDisplayNames(players);
  let dots = '';
  const xy = players.filter(p => typeof p.x === 'number' && typeof p.y === 'number');
  const rest = players.filter(p => !(typeof p.x === 'number' && typeof p.y === 'number'));
  for (const p of xy) dots += pitchDot(m, p, p.x, p.y, dns.get(p.id), captainId);
  const byLine = {};
  for (const p of rest) { (byLine[p.line] = byLine[p.line] || []).push(p); }
  for (const [line, ps] of Object.entries(byLine)) {
    const y = LINE_Y[line] != null ? LINE_Y[line] : 50;
    const n = ps.length;
    ps.forEach((p, i) => { dots += pitchDot(m, p, n === 1 ? 50 : 18 + (i * (64 / (n - 1))), y, dns.get(p.id), captainId); });
  }
  return `<div class="pitch">${pitchLines()}${dots}</div>
  <div class="field-legend"><i class="ti ti-circle-filled" style="color:#f5821f;font-size:.9em;vertical-align:-.05em"></i> = doelman · cijfer in bol = positienummer · onder = naam</div>`;
}
function captainAtStartOfQuarter(m, qNum) {
  const startMs = gameTimeMsAtStartOfQuarter(m, qNum);
  const allChanges = (m.events || []).filter(e => e.type === 'captain_change')
    .sort((a, b) => (a.gameTimeMs || 0) - (b.gameTimeMs || 0));
  if (!allChanges.length) return m.captainId;
  // Wijzigingen die plaatsvonden vóór of exact bij de start van dit kwart
  const before = allChanges.filter(e => (e.gameTimeMs || 0) <= startMs);
  if (!before.length) return allChanges[0].fromId || m.captainId;
  return before[before.length - 1].playerId;
}

    <circle cx="${W/2}" cy="${PENY}" r="3" fill="#fff"/>
    <circle cx="${W/2}" cy="${H-PENY}" r="3" fill="#fff"/>
    <path d="M ${CR} 0 A ${CR} ${CR} 0 0 0 0 ${CR}" fill="none" stroke="#fff" stroke-width="2"/>

      <div class="mi-date">${m.teamName?'<b>'+esc(m.teamName)+'</b> · ':''}${matchWhen(m)}${st!=='planned'&&m.location?' · '+esc(m.location):''}</div>

    </div>${right}</div>`;
}

  const newBtn = canManage() ? `<button class="btn btn-org" onclick="newMatch()" style="margin-bottom:14px">${icI(IC.ball)} + Nieuwe wedstrijd</button>` : '';

  el.innerHTML = offlineBanner + guestBanner + viewerWelcome + tiles + createTeamHint + newBtn + filterBar + matchSection + noneSection + recentHtml + trnSection + coAdminHint;
