// WEDSTRIJDEN = volledige lijst met filter + zoeken.
async function loadMatches() {
  const all = (await dbAll()).filter(m => !m.tournamentId);
  const el = document.getElementById('matches-content');
  if (!el) return;
  if (!all.length) {
    el.innerHTML = `<div class="empty"><div class="ei">${IC.ball}</div><p>Nog geen wedstrijden.<br>Maak eerst een ploeg aan, tik dan <b>+</b>.</p></div>`;
    return;
  }
  const teams = [...new Set(all.map(m => m.teamName).filter(Boolean))].sort();
  if (cloudReady) homeFilter = 'all'; // binnen een ploeg geen ploegfilter
  if (homeFilter !== 'all' && !teams.includes(homeFilter)) homeFilter = 'all';
  const list = (homeFilter === 'all' ? all : all.filter(m => m.teamName === homeFilter)).slice();
  const filterBar = (!cloudReady && teams.length) ? `<div class="filterbar">
    <select onchange="setHomeFilter(this.value)">
      <option value="all" ${homeFilter==='all'?'selected':''}>Alle ploegen (${all.length})</option>
      ${teams.map(t => `<option value="${esc(t)}" ${homeFilter===t?'selected':''}>${esc(t)} (${all.filter(m=>m.teamName===t).length})</option>`).join('')}
    </select></div>` : '';
  // Gescheiden in duidelijke groepen: live · gepland (vroegste eerst) · gespeeld (recentste eerst).
  const live = list.filter(m => m.status === 'live');
  const planned = list.filter(m => m.status === 'planned').sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  const done = list.filter(m => m.status === 'done').sort((a, b) => (b.date || '').localeCompare(a.date || '') || (b.createdAt - a.createdAt));
  const sec = (title, arr) => arr.length ? `<div class="sec">${title}</div>${arr.map(matchItemHtml).join('')}` : '';
  const items = list.length
    ? sec(`${icI(IC.live)} Live`, live) + sec(`${icI(IC.calendar)} Geplande wedstrijden`, planned) + sec(`${icI(IC.done)} Gespeelde wedstrijden`, done)
    : `<div class="empty"><div class="ei">${IC.search}</div><p>Geen wedstrijden voor deze ploeg.</p></div>`;
  const searchBar = all.length > 6 ? `<div class="searchbar"><input id="home-search" type="search" placeholder="Zoek op tegenstander, ploeg, plaats…" oninput="filterHomeItems(this.value)" value="${esc(homeSearch)}"></div>` : '';
  const newBtn = canManage() ? `<button class="btn btn-org" onclick="newMatch()" style="margin-bottom:12px">${icI(IC.ball)} + Nieuwe wedstrijd</button>` : '';
  el.innerHTML = newBtn + filterBar + searchBar + `<div id="match-list">${items}</div>`;
  if (homeSearch) filterHomeItems(homeSearch);
}
let homeSearch = '';
function filterHomeItems(q) {
  homeSearch = q;
  const term = (q || '').trim().toLowerCase();
  const list = document.getElementById('match-list');
  if (!list) return;
  let shown = 0;
  list.querySelectorAll('.match-item').forEach(el => {
    const hit = !term || (el.getAttribute('data-s') || '').includes(term);
    el.style.display = hit ? '' : 'none';
    if (hit) shown++;
  });
  let none = document.getElementById('search-none');
  if (!shown && term) {
    if (!none) { none = document.createElement('div'); none.id = 'search-none'; none.className = 'empty'; none.innerHTML = `<div class="ei">${IC.search}</div><p>Geen wedstrijden gevonden.</p>`; list.appendChild(none); }
  } else if (none) { none.remove(); }
}

// ===================== SEIZOENSSTATISTIEKEN =====================
let statsFilter = 'all', seasonFilter = 'all';
function setStatsFilter(v) { statsFilter = v; loadStats(); }
function setSeasonFilter(v) { seasonFilter = v; loadStats(); }
// Seizoen van een wedstrijd (Belgisch voetbalseizoen: juli–juni).
function seasonOf(m) {
  const d = m.date ? new Date(m.date + 'T00:00:00') : new Date(m.createdAt);
  const y = d.getFullYear(), start = d.getMonth() >= 6 ? y : y - 1;
  return `${start}/${start + 1}`;
}
async function loadStats() {
  const all = await dbAll();
  const el = document.getElementById('stats-content');
  if (!el) return;
  const teams = [...new Set(all.map(m => m.teamName).filter(Boolean))].sort();
  const seasons = [...new Set(all.map(seasonOf))].sort().reverse();
  if (cloudReady) statsFilter = 'all'; // binnen een ploeg geen ploegfilter
  if (statsFilter !== 'all' && !teams.includes(statsFilter)) statsFilter = 'all';
  if (seasonFilter !== 'all' && !seasons.includes(seasonFilter)) seasonFilter = 'all';
  // Tornooiwedstrijden tellen niet mee in de algemene statistieken (zelfde aanpak als de "Wedstrijden"-lijst).
  const list = all.filter(m => m.status === 'done' && !m.tournamentId && (statsFilter === 'all' || m.teamName === statsFilter) && (seasonFilter === 'all' || seasonOf(m) === seasonFilter));
  const filterBar = `${(!cloudReady && teams.length) ? `<div class="filterbar"><select onchange="setStatsFilter(this.value)">
      <option value="all" ${statsFilter==='all'?'selected':''}>Alle ploegen</option>
      ${teams.map(t => `<option value="${esc(t)}" ${statsFilter===t?'selected':''}>${esc(t)}</option>`).join('')}
    </select></div>` : ''}${seasons.length > 1 ? `<div class="filterbar"><select onchange="setSeasonFilter(this.value)">
      <option value="all" ${seasonFilter==='all'?'selected':''}>Alle seizoenen</option>
      ${seasons.map(s => `<option value="${s}" ${seasonFilter===s?'selected':''}>Seizoen ${s}</option>`).join('')}
    </select></div>` : ''}`;
  if (!list.length) { el.innerHTML = filterBar + `<div class="empty"><div class="ei">${IC.chart}</div><p>Nog geen wedstrijden.</p></div>`; return; }
  // Oudste eerst verwerken, zodat de weergavenaam van een speler steeds de meest recente is (bv. na een naamscorrectie).
  const sortedList = [...list].sort((a, b) => (a.date || '').localeCompare(b.date || '') || (a.createdAt || 0) - (b.createdAt || 0));
  let w = 0, d = 0, l = 0, gf = 0, ga = 0, cleanSheets = 0;
  const pl = {};
  // Groepeert op rosterId wanneer beschikbaar (stabiel over naamswijzigingen heen), anders op naam (oude matches, gasten).
  const getp = (rosterId, name, num) => {
    const nm = (name || 'Speler').trim();
    const k = rosterId || nm;
    const r = pl[k] || (pl[k] = { name: nm, rosterId: rosterId || null, number: num || '', goals: 0, assists: 0, ms: 0, yc: 0, rc: 0, mp: 0, cs: 0, squad: 0, absent: 0, lines: {} });
    if (name) r.name = nm;
    if (num) r.number = num;
    return r;
  };
  const getpById = (m, id) => { const p = m.players.find(x => x.id === id); return p ? getp(p.rosterId, p.name, p.number) : getp(null, pName(m, id)); };
  for (const m of sortedList) {
    gf += m.scoreUs; ga += m.scoreThem;
    if (m.scoreUs > m.scoreThem) w++; else if (m.scoreUs < m.scoreThem) l++; else d++;
    if (m.scoreThem === 0) cleanSheets++;
    const mins = calcMinutes(m);
    for (const p of (m.players || [])) {
      const r = getp(p.rosterId, p.name, p.number); const ms = mins[p.id] ? mins[p.id].ms : 0;
      r.squad++;
      if (ms > 0) { r.mp++; r.lines[p.line] = (r.lines[p.line] || 0) + 1; }
      r.ms += ms;
      if (ms > 0 && p.line === 'Doel' && m.scoreThem === 0) r.cs++;  // clean sheet voor de keeper
    }
    for (const a of (m.absentPlayers || [])) { const ab = typeof a === 'string' ? { name: a, rosterId: null } : a; const r = getp(ab.rosterId, ab.name); r.absent++; }
    for (const e of m.events) {
      if (e.type === 'goal_us' && e.playerId) { getpById(m, e.playerId).goals++; if (e.assistId) getpById(m, e.assistId).assists++; }
      if (e.type === 'penalty_us' && e.scored && e.playerId) getpById(m, e.playerId).goals++;  // strafschopdoelpunt telt mee
      if (e.type === 'yellow_card' && e.playerId) getpById(m, e.playerId).yc++;
      if (e.type === 'red_card' && e.playerId) getpById(m, e.playerId).rc++;
    }
  }
  const players = Object.values(pl);
  const pDetTeam = statsFilter !== 'all' ? statsFilter : '';
  const prow = p => `style="cursor:pointer" onclick="openPlayerDetail('${jsq(p.name)}','${jsq(pDetTeam)}','${jsq(p.rosterId || '')}')"`;
  const topList = (arr, val, unit) => arr.length ? arr.map((p, i) => `<div class="stat-row" ${prow(p)}><span class="stat-rank">${i+1}</span><span style="flex:1">${esc(p.name)}</span><span style="font-weight:800">${val(p)}${unit}</span></div>`).join('') : '<p style="color:var(--txt2);font-size:14px">—</p>';
  const scorers = players.filter(p => p.goals > 0).sort((a, b) => b.goals - a.goals).slice(0, 10);
  const assisters = players.filter(p => p.assists > 0).sort((a, b) => b.assists - a.assists).slice(0, 10);
  const minutes = players.filter(p => p.ms > 0).sort((a, b) => b.ms - a.ms).slice(0, 15);
  const fairplay = players.filter(p => p.mp > 0).sort((a, b) => (a.ms / a.mp) - (b.ms / b.mp)).slice(0, 12);
  const keepers = players.filter(p => p.cs > 0).sort((a, b) => b.cs - a.cs);
  const carded = players.filter(p => p.yc || p.rc).sort((a, b) => (b.yc + b.rc * 2) - (a.yc + a.rc * 2));
  const posList = players.filter(p => p.mp > 0 && Object.keys(p.lines).length).sort((a, b) => b.mp - a.mp);
  const anyAbsent = players.some(p => p.absent);
  const attend = players.filter(p => (p.squad + p.absent) > 0).sort((a, b) => (b.squad / (b.squad + b.absent)) - (a.squad / (a.squad + a.absent)) || b.squad - a.squad);
  el.innerHTML = filterBar + `
    <div class="card">
      <div class="stat-big" style="margin-bottom:10px">
        <div class="stat-box"><div class="v">${list.length}</div><div class="l">Gespeeld</div></div>
        <div class="stat-box"><div class="v" style="color:var(--grn)">${w}</div><div class="l">Winst</div></div>
        <div class="stat-box"><div class="v">${d}</div><div class="l">Gelijk</div></div>
        <div class="stat-box"><div class="v" style="color:var(--rd)">${l}</div><div class="l">Verlies</div></div>
      </div>
      <div class="stat-big">
        <div class="stat-box"><div class="v">${gf}</div><div class="l">Doelpunten voor</div></div>
        <div class="stat-box"><div class="v">${ga}</div><div class="l">Doelpunten tegen</div></div>
        <div class="stat-box"><div class="v">${gf-ga>=0?'+':''}${gf-ga}</div><div class="l">Saldo</div></div>
      </div>
    </div>
    <div class="sec">${icI(IC.ball)} Topschutters</div><div class="card">${topList(scorers, p => p.goals, '')}</div>
    <div class="sec">${icI(IC.assist)} Meeste assists</div><div class="card">${topList(assisters, p => p.assists, '')}</div>
    <div class="sec">${icI(IC.timer)} Meeste speelminuten</div><div class="card">${minutes.length ? minutes.map((p,i)=>`<div class="stat-row" ${prow(p)}><span class="stat-rank">${i+1}</span><span style="flex:1">${esc(p.name)}<small style="color:var(--txt2);display:block">${p.mp} ${p.mp===1?'wedstrijd':'wedstrijden'} · gem. ${Math.round(p.ms/p.mp/60000)}'/match</small></span><span style="font-weight:800">${Math.floor(p.ms/60000)}'</span></div>`).join('') : '<p style="color:var(--txt2);font-size:14px">—</p>'}</div>
    <div class="sec">${icI(IC.balance)} Fair-play · minste speeltijd</div><div class="card"><p style="font-size:12px;color:var(--txt2);margin-bottom:8px">Gesorteerd op laagste gemiddelde speeltijd per wedstrijd — zo zie je snel wie meer speelkansen verdient.</p>${fairplay.length ? fairplay.map(p=>`<div class="stat-row" ${prow(p)}><span style="flex:1">${esc(p.name)}</span><span style="color:var(--txt2);font-size:13px">${p.mp} wd</span><span style="font-weight:800;min-width:64px;text-align:right">${Math.round(p.ms/p.mp/60000)}'/match</span></div>`).join('') : '<p style="color:var(--txt2);font-size:14px">—</p>'}</div>
    <div class="sec">${icI(IC.save)} Clean sheets</div><div class="card"><div class="stat-row"><span style="flex:1">Ploeg (geen tegendoel)</span><span style="font-weight:800">${cleanSheets}/${list.length}</span></div>${keepers.map(p=>`<div class="stat-row" ${prow(p)}><span style="flex:1">${esc(p.name)}</span><span style="font-weight:800">${p.cs}</span></div>`).join('')}</div>
    ${carded.length ? `<div class="sec">${icI(IC.cardY)} Kaarten</div><div class="card">${carded.map(p=>`<div class="stat-row" ${prow(p)}><span style="flex:1">${esc(p.name)}</span><span>${p.yc?icI(IC.cardY).repeat(p.yc):''}${p.rc?icI(IC.cardR).repeat(p.rc):''}</span></div>`).join('')}</div>` : ''}
    ${posList.length ? `<div class="sec">${icI(IC.compass)} Posities <span style="font-weight:400;text-transform:none;color:var(--txt2)">(hoe vaak per linie)</span></div><div class="card">${posList.map(p=>{const parts=Object.entries(p.lines).sort((a,b)=>b[1]-a[1]).map(([l,c])=>`${LINE_SHORT[l]||l}×${c}`).join(' · ');return `<div class="stat-row" ${prow(p)}><span style="flex:1">${esc(p.name)}</span><span style="color:var(--txt2);font-size:13px">${parts}</span></div>`;}).join('')}</div>` : ''}
    ${anyAbsent ? `<div class="sec">${icI(IC.clipboard)} Aanwezigheid <span style="font-weight:400;text-transform:none;color:var(--txt2)">(in selectie / totaal)</span></div><div class="card">${attend.map(p=>{const tot=p.squad+p.absent;const pct=tot?Math.round(p.squad/tot*100):0;return `<div class="stat-row" ${prow(p)}><span style="flex:1">${esc(p.name)}</span><span style="color:var(--txt2);font-size:13px">${p.squad}/${tot}</span><span style="font-weight:800;min-width:46px;text-align:right${pct<60?';color:var(--org)':''}">${pct}%</span></div>`;}).join('')}</div>` : ''}`;

// ===================== SPELERSDETAIL =====================
let playerDetailName = null, playerDetailTeamName = null, playerDetailRosterId = null, playerDetailSeason = 'all', _playerDetailFrom = 'stats';
// Huidig Belgisch voetbalseizoen (juli–juni) op basis van vandaag.
function currentSeasonLabel() {
  const d = new Date(), y = d.getFullYear(), start = d.getMonth() >= 6 ? y : y - 1;
  return `${start}/${start + 1}`;
}
function openPlayerDetail(name, teamName, rosterId) {
  name = (name || '').trim();
  if (!name) return;
  playerDetailName = name; playerDetailTeamName = teamName || null; playerDetailRosterId = rosterId || null; playerDetailSeason = null; _playerDetailFrom = view;
  go('playerDetail');
}
function setPlayerDetailSeason(v) { playerDetailSeason = v; loadPlayerDetail(); }
async function loadPlayerDetail() {
  const all = await dbAll();
  const el = document.getElementById('player-detail-content');
  if (!el) return;
  const name = (playerDetailName || '').trim();
  const rosterId = playerDetailRosterId || null;
  const inTeam = m => !playerDetailTeamName || m.teamName === playerDetailTeamName;
  // Matcht bij voorkeur op het stabiele ploegrooster-id; oudere matches zonder rosterId vallen terug op naam.
  const findPlayer = m => {
    const players = m.players || [];
    if (rosterId) {
      const byId = players.find(p => p.rosterId === rosterId);
      if (byId) return byId;
    }
    return players.find(p => (p.name || '').trim() === name);
  };
  // Tornooiwedstrijden tellen niet mee bij gespeeld/doelpunten/etc. — die krijgen hieronder een apart "Tornooien"-kadertje.
  const allDone = all.filter(m => m.status === 'done' && !m.tournamentId && inTeam(m) && findPlayer(m));
  const seasons = [...new Set(allDone.map(seasonOf))].sort().reverse();
  if (!playerDetailSeason || (playerDetailSeason !== 'all' && !seasons.includes(playerDetailSeason))) {
    playerDetailSeason = seasons[0] || 'all';
  }
  const filterBar = allDone.length ? `<div class="filterbar"><select onchange="setPlayerDetailSeason(this.value)">
      <option value="all" ${playerDetailSeason==='all'?'selected':''}>Alle seizoenen</option>
      ${seasons.map(s => `<option value="${s}" ${playerDetailSeason===s?'selected':''}>Seizoen ${s}</option>`).join('')}
    </select></div>` : '';
  const doneList = allDone.filter(m => playerDetailSeason === 'all' || seasonOf(m) === playerDetailSeason);
  doneList.sort((a, b) => (b.date || '').localeCompare(a.date || '') || (b.createdAt || 0) - (a.createdAt || 0));
  if (!doneList.length) { el.innerHTML = filterBar + `<div class="empty"><div class="ei">${IC.chart}</div><p>Nog geen gespeelde wedstrijden voor ${esc(name)}${playerDetailSeason!=='all'?(' in seizoen '+playerDetailSeason):''}.</p></div>`; return; }
  let goals = 0, assists = 0, ms = 0, mp = 0, yc = 0, rc = 0, cs = 0, keeperApps = 0, squad = 0, absent = 0, number = '', pos = '';
  const rows = [];
  for (const m of doneList) {
    const pl = findPlayer(m);
    if (!pl) continue;
    if (pl.number) number = pl.number;
    if (pl.line) pos = pl.line;
    const mins = calcMinutes(m);
    const pms = mins[pl.id] ? mins[pl.id].ms : 0;
    let g = 0, a = 0, y = 0, r = 0;
    for (const e of m.events) {
      if (e.type === 'goal_us' && e.playerId === pl.id) g++;
      if (e.type === 'penalty_us' && e.scored && e.playerId === pl.id) g++;
      if (e.assistId === pl.id) a++;
      if (e.type === 'yellow_card' && e.playerId === pl.id) y++;
      if (e.type === 'red_card' && e.playerId === pl.id) r++;
    }
    squad++;
    if (pms > 0) { mp++; ms += pms; if (pl.line === 'Doel') { keeperApps++; if (m.scoreThem === 0) cs++; } }
    goals += g; assists += a; yc += y; rc += r;
    rows.push({ m, pms, g, a, y, r });
  }
  for (const m of all.filter(m2 => m2.status === 'done' && !m2.tournamentId && inTeam(m2) && (playerDetailSeason === 'all' || seasonOf(m2) === playerDetailSeason))) {
    const wasAbsent = (m.absentPlayers || []).some(a => { const ab = typeof a === 'string' ? { name: a, rosterId: null } : a; return rosterId ? ab.rosterId === rosterId : (ab.name || '').trim() === name; });
    if (wasAbsent) absent++;
  }
  const pct = (squad + absent) ? Math.round(squad / (squad + absent) * 100) : null;
  // Aparte telling: in hoeveel tornooien de speler geselecteerd stond (aantal wedstrijden binnen dat tornooi is niet relevant).
  const inTournamentSquad = t => {
    const squad = t.squad || {};
    const pool = squad.players ? squad.players.filter(s => s.sel !== 'absent') : [...(squad.base || []), ...(squad.bench || [])];
    return pool.some(s => rosterId ? s.srcId === rosterId : (s.name || '').trim() === name);
  };
  const tInTeam = t => { if (!playerDetailTeamName) return true; const tm = teamById(t.teamId); return (tm && tm.name === playerDetailTeamName) || t.teamName === playerDetailTeamName; };
  const tournamentCount = getTournaments().filter(t => tInTeam(t) && (playerDetailSeason === 'all' || seasonOf(t) === playerDetailSeason) && inTournamentSquad(t)).length;
  el.innerHTML = filterBar + `
    <div class="card">
      <div style="text-align:center;margin-bottom:10px">
        <div style="font-size:20px;font-weight:800">${esc(name)}</div>
        <div style="font-size:13px;color:var(--txt2)">${number ? ('Rugnr. ' + esc(number) + (pos ? ' · ' : '')) : ''}${pos ? esc(pos) : ''}</div>
      </div>
      <div class="stat-big">
        <div class="stat-box"><div class="v">${mp}</div><div class="l">Gespeeld</div></div>
        <div class="stat-box"><div class="v">${goals}</div><div class="l">Doelpunten</div></div>
        <div class="stat-box"><div class="v">${assists}</div><div class="l">Assists</div></div>
      </div>
      <div class="stat-big" style="margin-top:10px">
        <div class="stat-box"><div class="v">${Math.floor(ms / 60000)}'</div><div class="l">Speeltijd</div></div>
        <div class="stat-box"><div class="v">${mp ? Math.round(ms / mp / 60000) : 0}'</div><div class="l">Gem./match</div></div>
        <div class="stat-box"><div class="v">${pct != null ? pct + '%' : '–'}</div><div class="l">Aanwezig</div></div>
      </div>
    </div>
    ${tournamentCount ? `<div class="sec">${icI(IC.medal)} Tornooien</div><div class="card"><div class="stat-row"><span style="flex:1">Geselecteerd voor</span><span style="font-weight:800">${tournamentCount} ${tournamentCount===1?'tornooi':'tornooien'}</span></div></div>` : ''}
    ${(yc || rc) ? `<div class="sec">${icI(IC.cardY)} Kaarten</div><div class="card"><div class="stat-row"><span style="flex:1">Gele kaarten</span><span style="font-weight:800">${yc}</span></div><div class="stat-row"><span style="flex:1">Rode kaarten</span><span style="font-weight:800">${rc}</span></div></div>` : ''}
    ${keeperApps ? `<div class="sec">${icI(IC.save)} Als doelman</div><div class="card"><div class="stat-row"><span style="flex:1">Wedstrijden in doel</span><span style="font-weight:800">${keeperApps}</span></div><div class="stat-row"><span style="flex:1">Clean sheets</span><span style="font-weight:800">${cs}</span></div></div>` : ''}
    <div class="sec">${icI(IC.ball)} Wedstrijden</div>
    <div class="card">${rows.map(r => `<div class="stat-row" style="cursor:pointer" onclick="go('detail','${r.m.id}')">
      <span style="flex:1">
        <b style="font-size:14px">${esc(matchTitle(r.m))}</b>
        <small style="color:var(--txt2);display:block">${matchWhen(r.m)} · ${scoreTxt(r.m)}${r.g ? ` · ${icI(IC.goal)}×${r.g}` : ''}${r.a ? ` · ${icI(IC.assist)}×${r.a}` : ''}${r.y ? ` · ${icI(IC.cardY).repeat(r.y)}` : ''}${r.r ? ` · ${icI(IC.cardR).repeat(r.r)}` : ''}</small>
      </span>
      <span style="font-weight:800">${r.pms > 0 ? Math.floor(r.pms / 60000) + "'" : '–'}</span>
    </div>`).join('')}</div>`;
}

async function exportBackup() {
  const matches = await dbAll();
  const data = { app: 'voetbal', version: 2, exportedAt: Date.now(), matches,
    settings: { clubName: localStorage.getItem('voetbal_club_name'), clubLogo: localStorage.getItem('voetbal_club_logo'),

      rosters: localStorage.getItem('voetbal_rosters'), countdown: localStorage.getItem('voetbal_countdown'),
      theme: localStorage.getItem('voetbal_theme'), dark: localStorage.getItem('voetbal_dark'),

  const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
  const a = document.createElement('a');

function importBackup(input) {
  const f = input.files && input.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = e => {
    let data;
    try { data = JSON.parse(e.target.result); } catch (err) { showToast('Ongeldig back-upbestand.', 'err'); return; }
    // Losse wedstrijd?
    if (data && data.app === 'voetbal-match' && data.match) {
      pendingRestore = { matches: [data.match], settings: null, single: true };
      openModal(`<h3>Wedstrijd importeren?</h3>
        <p style="text-align:center;color:var(--txt2);margin-bottom:16px"><b>${esc(data.match.teamName||'')} vs ${esc(data.match.opponent||'')}</b><br>Deze wordt toegevoegd aan je bestaande wedstrijden.</p>
        <button class="btn btn-green" onclick="doRestore('merge')">＋ Toevoegen</button>
        <button class="btn btn-gray" style="margin-top:8px" onclick="closeModal()">Annuleren</button>`);
      input.value = ''; return;
    }
    if (!data || data.app !== 'voetbal' || !Array.isArray(data.matches)) { showToast('Dit lijkt geen geldige voetbal-back-up.', 'err'); return; }
    pendingRestore = data;
    openModal(`<h3>Back-up gevonden</h3>
      <p style="text-align:center;color:var(--txt2);margin-bottom:16px">${data.matches.length} wedstrijden in dit bestand.<br>Wil je ze <b>samenvoegen</b> met je huidige data, of <b>alles vervangen</b>?</p>
      <button class="btn btn-green" onclick="doRestore('merge')">${icI(IC.link)} Samenvoegen (toevoegen)</button>
      <button class="btn btn-red" style="margin-top:8px" onclick="doRestore('replace')">${icI(IC.warn)} Alles vervangen</button>
      <button class="btn btn-gray" style="margin-top:8px" onclick="closeModal()">Annuleren</button>`);
    input.value = '';
  };
  reader.readAsText(f);
}

let pendingRestore = null;
async function doRestore(mode) {
  const data = pendingRestore;
  if (!data) return;
  const incoming = data.matches || [];
  const norm = s => (s || '').trim().toLowerCase();
  if (mode === 'replace') {
    await new Promise((res, rej) => { const tx = db.transaction('matches', 'readwrite'); const st = tx.objectStore('matches'); st.clear(); incoming.forEach(m => st.put(m)); tx.oncomplete = () => res(); tx.onerror = () => rej(); });
    const s = data.settings || {};
    const setOrDel = (k, v) => { if (v == null) localStorage.removeItem(k); else localStorage.setItem(k, v); };
    setOrDel('voetbal_club_name', s.clubName); setOrDel('voetbal_club_logo', s.clubLogo);
    setOrDel('voetbal_teams', s.teams); setOrDel('voetbal_teams_v2', s.teamsV2); setOrDel('voetbal_last_team', s.lastTeam);
    setOrDel('voetbal_rosters', s.rosters); setOrDel('voetbal_countdown', s.countdown);
    setOrDel('voetbal_theme', s.theme); setOrDel('voetbal_dark', s.dark);
    setOrDel('voetbal_tournaments', s.tournaments);
  } else {
    // Samenvoegen: enkel wedstrijden toevoegen die nog niet bestaan (op id).
    const existing = await dbAll();
    const ids = new Set(existing.map(m => m.id));
    const toAdd = incoming.filter(m => !ids.has(m.id));
    if (toAdd.length) await new Promise((res, rej) => { const tx = db.transaction('matches', 'readwrite'); const st = tx.objectStore('matches'); toAdd.forEach(m => st.put(m)); tx.oncomplete = () => res(); tx.onerror = () => rej(); });
    // Ploegen samenvoegen (op naam) indien aanwezig in de back-up.
    if (data.settings && data.settings.teamsV2) {
      let inc = []; try { inc = JSON.parse(data.settings.teamsV2) || []; } catch (e) {}
      const cur = getTeamsV2(); const keys = new Set(cur.map(t => norm(t.name)));
      inc.forEach(t => { if (!keys.has(norm(t.name))) { cur.push(t); keys.add(norm(t.name)); } });
      saveTeamsV2(cur);
    }
    if (data.settings && data.settings.tournaments) {
      let incT = []; try { incT = JSON.parse(data.settings.tournaments) || []; } catch(e) {}
      const curT = getTournaments(); const tIds = new Set(curT.map(t => t.id));
      incT.forEach(t => { if (!tIds.has(t.id)) { curT.push(t); tIds.add(t.id); } });
      localStorage.setItem('voetbal_tournaments', JSON.stringify(curT));
    }
  }
  localStorage.setItem('voetbal_setup_done', '1');
  pendingRestore = null;
  closeModal(); match = null; applyStoredTheme(); applyDark(); go('home');
  setTimeout(() => showToast(mode === 'replace' ? 'Back-up hersteld' : 'Back-ups samengevoegd', 'ok'), 100);
}
function handleLogoFile(input) {
  const f = input.files && input.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const max = 256; let w = img.width, h = img.height;
      const scale = Math.min(1, max / Math.max(w, h));
      w = Math.round(w * scale); h = Math.round(h * scale);
      const c = document.createElement('canvas'); c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      pendingLogo = c.toDataURL('image/png');
      pendingTheme = extractPalette(c);
      if (pendingTheme) applyTheme(pendingTheme);
      setLogoPreview(pendingLogo);
    };
    img.onerror = () => showToast('Kon deze afbeelding niet laden. Probeer een andere.', 'err');
    img.src = e.target.result;
  };
  reader.readAsDataURL(f);
}
function setLogoPreview(src) {
  const cur = document.getElementById('s-logo-img'); if (!cur) return;
  if (cur.tagName === 'IMG') { cur.src = src; }
  else { const img = document.createElement('img'); img.id = 's-logo-img'; img.src = src; img.alt = 'logo'; cur.replaceWith(img); }
}
function useDefaultLogo() {
  pendingLogo = 'DEFAULT'; pendingTheme = null;
  applyTheme(GENERIC_THEME);
  setLogoPreview('logo-default.svg');
}
function saveSettings(isFirst) {
  localStorage.setItem('voetbal_setup_done', '1');

}

async function doChangePassword() {
  const oldPwd = (document.getElementById('cp-old') || {}).value || '';
  const newPwd = (document.getElementById('cp-new') || {}).value || '';
  const newPwd2 = (document.getElementById('cp-new2') || {}).value || '';
  const err = document.getElementById('cp-err');
  if (!oldPwd) { if (err) err.textContent = 'Geef je huidig wachtwoord in.'; return; }
  if (newPwd.length < 6) { if (err) err.textContent = 'Nieuw wachtwoord moet minstens 6 tekens zijn.'; return; }
  if (newPwd !== newPwd2) { if (err) err.textContent = 'De twee nieuwe wachtwoorden zijn niet gelijk.'; return; }
  if (err) err.textContent = 'Bezig...';
  try {
    const cred = firebase.auth.EmailAuthProvider.credential(currentUser.email, oldPwd);
    await currentUser.reauthenticateWithCredential(cred);
    await currentUser.updatePassword(newPwd);

}
async function doDeleteCloudTeam() {
  if (!isAdmin || !activeTeamId || !fbdb) return;
  const tid = activeTeamId;
  const err = document.getElementById('delteam-err');
  const pwd = (document.getElementById('delteam-pwd') || {}).value || '';
  if (!pwd) { if (err) err.textContent = 'Geef je wachtwoord in.'; return; }
  if (err) err.textContent = 'Bezig met verwijderen...';
  try {
    // Wachtwoord opnieuw bevestigen
    const cred = firebase.auth.EmailAuthProvider.credential(currentUser.email, pwd);
    await currentUser.reauthenticateWithCredential(cred);
    const [teamSnap, memberInfoSnap] = await Promise.all([
      fbdb.ref('teams/' + tid).once('value'),
      fbdb.ref('memberInfo/' + tid).once('value'),
    ]);
    // Backup opslaan vóór verwijderen
    await fbdb.ref('deletedTeams/' + tid).set({
      deletedAt: Date.now(),
      deletedBy: currentUser.uid,
      deletedByEmail: currentUser.email || '',
      team: teamSnap.val(),
      memberInfo: memberInfoSnap.val(),
    });
    const token = ((teamSnap.val() || {}).info || {}).inviteToken;
    // Uitnodiging + ledeninfo eerst proberen wissen (terwijl team-lidmaatschap nog bestaat)
    if (token) { try { await fbdb.ref('invites/' + token).remove(); } catch (e) {} }
    try { await fbdb.ref('memberInfo/' + tid).remove(); } catch (e) {}
    // Het hele team verwijderen
    await fbdb.ref('teams/' + tid).remove();
    if (currentUser) { try { await fbdb.ref('users/' + currentUser.uid + '/teams/' + tid).remove(); } catch (e) {} }
    delete userTeams[tid];
    stopTeamListeners();
    activeTeamId = null; isAdmin = false;
    localStorage.removeItem('voetbal_activeTeamId');
    closeModal();
    go('teamselect', undefined, true);
  } catch (e) {
    console.error('Ploeg verwijderen mislukt:', e);
    if (err) err.textContent = (e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential')
      ? 'Onjuist wachtwoord.'
      : 'Verwijderen mislukt: ' + (e.message || 'probeer opnieuw.');
  }
}

function teamPasteApply() {
  const ta = document.getElementById('paste-area'); if (!ta) return;
  let added = 0;
  ta.value.split('\n').forEach(raw => {
    const line = raw.trim(); if (!line) return;
    const mtch = line.match(/^(\d{1,3})[\s.\-)]+(.*)$/);
    const number = mtch ? mtch[1] : '';
    const rest = (mtch ? mtch[2] : line).trim();
    if (!rest) return;
    const parts = rest.split(/\s+/);
    const firstName = parts.shift() || '';
    const lastName = parts.join(' ');
    editingTeam.players.push({ id: uid(), firstName, lastName, name: (firstName + ' ' + lastName).trim(), number, pos: '' });
    added++;
  });
  closeModal();
  if (added) render(); else showToast('Geen spelers gevonden in de lijst.', 'err');
}
function saveTeamEdit() {
  if (!editingTeam.name.trim()) { showToast('Geef de ploeg een naam.', 'err'); return; }
  const clean = {
    id: editingTeam.id,
    name: editingTeam.name.trim(),
    responsible: (editingTeam.responsible || '').trim(),
    trainers: (editingTeam.trainers || []).map(t => ({ id: t.id || uid(), name: (t.name || '').trim() })).filter(t => t.name),
    players: editingTeam.players.filter(p => (pFirstName(p) || pLastName(p) || '').trim()).map(p => {
      const fn = ((p.firstName !== undefined ? p.firstName : pFirstName(p)) || '').trim();
      const ln = ((p.lastName !== undefined ? p.lastName : pLastName(p)) || '').trim();
      return { id: p.id, firstName: fn, lastName: ln, name: (fn + ' ' + ln).trim() || p.name || '', number: p.number || '', pos: p.pos || '' };
    })
  };
  if (editingTeam.fromCloud) clean.fromCloud = true;
  const arr = getTeamsV2(); const idx = arr.findIndex(t => t.id === clean.id);
  if (idx >= 0) arr[idx] = clean; else arr.push(clean);
  saveTeamsV2(arr); editingTeam = null; go(cloudReady ? 'home' : 'teams');
}

  const newBtn = canManage() ? `<button class="btn btn-green" onclick="newTournament()">${icI(IC.medal)} + Nieuw tornooi</button>` : '';
  const trnRow = (t, borderColor) => {
    const team = teamById(t.teamId);
    return `<div class="team-row" style="border-left-color:${borderColor}" onclick="goTournament('${t.id}')">
      <div>
        <div class="tn">${icI(IC.medal)} ${esc(t.name)}</div>
        <div class="tc">${t.date ? fmtDate(new Date(t.date + 'T00:00:00').getTime()) : ''}${t.location ? ' · ' + esc(t.location) : ''}${team ? ' · ' + esc(team.name) : ''}</div>
      </div>
      <span style="margin-left:auto;color:var(--txt2);font-size:22px">›</span>
    </div>`;
  };
  const plannedHtml = planned.length
    ? planned.map(t => trnRow(t, 'var(--orn)')).join('')
    : `<div class="empty" style="padding:16px"><p style="margin:0;color:var(--txt2)">Geen geplande tornooien.</p></div>`;
  const doneHtml = done.length
    ? done.map(t => trnRow(t, 'var(--tel)')).join('')
    : `<div class="empty" style="padding:16px"><p style="margin:0;color:var(--txt2)">Geen gespeelde tornooien.</p></div>`;
  const body = all.length
    ? `<div class="sec">${icI(IC.calendar)} Geplande tornooien</div>${plannedHtml}<div class="sec">${icI(IC.done)} Gespeelde tornooien</div>${doneHtml}`
    : `<div class="empty"><div class="ei">${IC.medal}</div><p>Nog geen tornooien.<br>Tik op de knop hieronder om er een aan te maken.</p></div>`;
  return `<div class="hdr"><button class="back" onclick="go('home')">‹</button><h1>${icI(IC.medal)} Tornooien</h1></div>
  <div class="content">
    ${newBtn}
    ${body}
  </div>`;
}

function renderTournament() {
  const t = currentTournament;
  if (!t) return '<div class="content"><p>Niet gevonden.</p></div>';
  setTimeout(loadTournamentDetail, 0);
  const editBtn = canManage() ? `<button class="hdr-btn" onclick="editTournament('${t.id}')">${icI(IC.edit)}</button>` : '';
  return `<div class="hdr"><button class="back" onclick="go('tournaments')">‹</button><h1>${icI(IC.medal)} ${esc(t.name)}</h1>${editBtn}</div>
  <div class="content" id="trn-content"><div class="empty"><div class="ei">${IC.timer}</div><p>Laden...</p></div></div>`;
}

async function loadTournamentDetail() {
  const t = currentTournament;
  if (!t) return;
  const el = document.getElementById('trn-content');
  if (!el) return;
  const all = await dbAll();
  const matches = all.filter(m => m.tournamentId === t.id).sort((a, b) => (a.date || '').localeCompare(b.date || '') || (a.createdAt - b.createdAt));
  const done = matches.filter(m => m.status === 'done');
  const team = teamById(t.teamId);
  const w = done.filter(m => m.scoreUs > m.scoreThem).length;
  const d = done.filter(m => m.scoreUs === m.scoreThem).length;
  const l = done.filter(m => m.scoreUs < m.scoreThem).length;
  const gf = done.reduce((s, m) => s + m.scoreUs, 0);
  const ga = done.reduce((s, m) => s + m.scoreThem, 0);
  const infoRows = [
    ['Ploeg', team ? team.name : (t.teamName || '')],
    ['Locatie', t.location],
    ['Trainer', t.trainer],
    ['Ploegverantwoordelijke', t.responsible],
  ].filter(([, v]) => v).map(([k, v]) => `<div class="stat-row"><span style="color:var(--txt2);min-width:140px">${k}</span><span style="font-weight:600">${esc(v)}</span></div>`).join('');
  const squad = t.squad || {};
  const squadMee = squad.players
    ? squad.players.filter(s => s.sel !== 'absent').length
    : (squad.base||[]).length + (squad.bench||[]).length;
  const squadRow = `<div class="stat-row"><span style="color:var(--txt2);min-width:140px">Selectie</span><span style="font-weight:600">${squadMee} spelers${t.matchType?' · '+t.matchType:''}</span></div>`;
  const statsHtml = done.length ? `<div class="card" style="margin-bottom:12px">
    <div class="stat-big">
      <div class="stat-box"><div class="v" style="color:var(--grn)">${w}</div><div class="l">Gewonnen</div></div>
      <div class="stat-box"><div class="v">${d}</div><div class="l">Gelijk</div></div>
      <div class="stat-box"><div class="v" style="color:var(--rd)">${l}</div><div class="l">Verloren</div></div>
      <div class="stat-box"><div class="v">${gf}–${ga}</div><div class="l">Doelpunten</div></div>
    </div>
  </div>` : '';
  const noSquad = squad.players ? !squad.players.length : !((squad.base||[]).length + (squad.bench||[]).length + (squad.absent||[]).length);
  const squadWarning = (canManage() && noSquad) ? `<div class="viewer-banner" style="background:var(--org-pale,#fff3e0);color:#b45309;border-color:#fbbf24">${icI(IC.warn)} Nog geen selectie ingegeven — geef eerst een selectie in voor je wedstrijden toevoegt. <button class="btn btn-org btn-sm" onclick="editTournament('${t.id}')">Selectie ingeven</button></div>` : '';
  const newMatchBtn = (canManage() && !noSquad) ? `<button class="btn btn-org" style="margin-bottom:12px" onclick="addTournamentMatch('${t.id}')">${icI(IC.ball)} + Wedstrijd toevoegen</button>` : '';
  const matchList = matches.length
    ? matches.map(m => `<div>${matchItemHtml(m)}${canManage() ? `<button class="btn btn-orgpale btn-sm" style="margin:-6px 0 10px;width:100%" onclick="cloneTournamentMatch('${m.id}','${t.id}')"><i class="ti ti-copy" style="font-size:1em;vertical-align:-.1em"></i> Kloon als nieuwe wedstrijd</button>` : ''}</div>`).join('')
    : `<div class="empty" style="padding:20px 0"><div class="ei" style="font-size:36px">${IC.ball}</div><p>Nog geen wedstrijden.${canManage() && !noSquad ? ' Voeg er een toe!' : ''}</p></div>`;
  el.innerHTML = `
    <div class="card">${infoRows}${squadRow}</div>
    ${squadWarning}
    ${statsHtml}
    ${newMatchBtn}
    <div class="sec">Wedstrijden (${matches.length})</div>
    ${matchList}
    ${canManage() ? `<div class="danger"><button class="btn btn-red" onclick="deleteTournamentConfirm('${t.id}')">${icI(IC.trash)} Tornooi verwijderen</button></div>` : ''}`;
}

function deleteTournamentConfirm(id) {
  const t = tournamentById(id); if (!t) return;
  openModal(`<h3>Tornooi verwijderen?</h3>
    <p style="text-align:center;color:var(--txt2);margin-bottom:16px">"${esc(t.name)}" wordt verwijderd. De wedstrijden blijven bewaard maar zijn niet meer gelinkt aan dit tornooi.</p>
    <button class="btn btn-red" onclick="doDeleteTournament('${id}')">${icI(IC.trash)} Ja, verwijderen</button>
    <button class="btn btn-gray" style="margin-top:8px" onclick="closeModal()">Annuleren</button>`);
}
function doDeleteTournament(id) {
  saveTournaments(getTournaments().filter(t => t.id !== id));
  currentTournament = null; closeModal(); go('tournaments');
}

// ----- Tornooi-wizard -----
function newTournament() {
  if (!canManage()) return;
  const now = new Date();
  const team = getTeamsV2()[0] || null;
  const teamTrainers = team ? (team.trainers || []).filter(tr => tr.name) : [];
  trnWiz = {
    step: 1, id: uid(), isNew: true,
    name: '', date: now.toISOString().split('T')[0],
    location: '', teamId: (team || {}).id || '',
    matchType: '8v8',
    trainer: teamTrainers.length ? teamTrainers[0].name : '',
    responsible: team ? (team.responsible || '') : '',
    trainerIsOther: false, pool: [], poolTeamId: null,
  };
  go('tournamentNew');
}
function editTournament(id) {
  if (!canManage()) return;
  const t = tournamentById(id); if (!t) return;
  trnWiz = Object.assign({}, t, { step: 1, isNew: false, pool: [], poolTeamId: null, matchType: t.matchType || '8v8' });
  trnWizBuildPool();
  const squad = t.squad || {};
  // Nieuw formaat: squad.players; oud formaat: squad.base + squad.bench + squad.absent
  const allSquad = squad.players
    ? squad.players
    : [...(squad.base||[]), ...(squad.bench||[]), ...(squad.absent||[])];
  const byKey = {};
  allSquad.forEach(s => { byKey[s.srcId || s.name] = s.sel || 'mee'; });
  trnWiz.pool.forEach(p => {
    const val = byKey[p.srcId] || byKey[p.name];
    p.sel = val === 'absent' ? 'absent' : (val ? 'mee' : 'none');
  });
  trnWiz.poolTeamId = trnWiz.teamId;
  go('tournamentNew');
}
function trnWizBuildPool() {
  const team = teamById(trnWiz.teamId);
  trnWiz.pool = team ? team.players.map(p => ({
    pid: uid(), srcId: p.id,
    name: ((pFirstName(p) + ' ' + pLastName(p)).trim()) || p.name || '',
    number: p.number || '', pos: p.pos || '', sel: 'none',
  })) : [];
}
function trnWizTeamChange() {
  captureTrnStep1();
  const team = teamById(trnWiz.teamId);
  if (team) {
    const trainers = (team.trainers || []).filter(tr => tr.name);
    trnWiz.trainer = trainers.length ? trainers[0].name : '';
    trnWiz.responsible = team.responsible || '';
    trnWiz.trainerIsOther = false;
    trnWizBuildPool(); trnWiz.poolTeamId = trnWiz.teamId;
  }
  render();
}
function trnTrainerSelChange(val) {
  trnWiz.trainerIsOther = val === '_other';
  if (!trnWiz.trainerIsOther) trnWiz.trainer = val;
  const fg = document.getElementById('trn-trainer-other-fg');
  if (fg) fg.style.display = trnWiz.trainerIsOther ? '' : 'none';
}
function captureTrnStep1() {
  const v = id => { const e = document.getElementById(id); return e ? e.value : ''; };
  const ts = document.getElementById('trn-team-sel'); if (ts) trnWiz.teamId = ts.value;
  trnWiz.name = (v('trn-name') || '').trim();
  trnWiz.date = v('trn-date');
  trnWiz.location = (v('trn-location') || '').trim();
  const mt = document.getElementById('trn-matchtype'); if (mt) trnWiz.matchType = mt.value;
  const trainerSel = document.getElementById('trn-trainer-sel');
  if (trainerSel) { trnWiz.trainerIsOther = trainerSel.value === '_other'; if (!trnWiz.trainerIsOther) trnWiz.trainer = trainerSel.value; }
  const trainerOther = document.getElementById('trn-trainer-other');
  if (trnWiz.trainerIsOther && trainerOther) trnWiz.trainer = trainerOther.value.trim();
  trnWiz.responsible = (v('trn-responsible') || '').trim();
}
function trnWizNext() {
  if (trnWiz.step === 1) {
    captureTrnStep1();
    if (!trnWiz.name) { showToast('Geef het tornooi een naam.', 'err'); return; }
    if (!trnWiz.teamId) { showToast('Kies een ploeg.', 'err'); return; }
    if (trnWiz.poolTeamId !== trnWiz.teamId) { trnWizBuildPool(); trnWiz.poolTeamId = trnWiz.teamId; }
    trnWiz.step = 2; render();
  }
}
function trnWizBack() { if (trnWiz.step > 1) { trnWiz.step--; render(); } }
function trnWizLeave() { trnWiz = null; go(currentTournament ? 'tournament' : 'tournaments'); }
function setTrnSel(pid, val) {
  const p = trnWiz.pool.find(x => x.pid === pid); if (!p) return;
  p.sel = (p.sel === val) ? 'none' : val;
  render();
}
function setTrnPoolNum(pid, val) { const p = trnWiz.pool.find(x => x.pid === pid); if (p) p.number = val; }
async function saveTournamentWiz() {
  const squad = {
    players: trnWiz.pool
      .filter(p => p.sel === 'mee' || p.sel === 'absent')
      .map(p => ({ pid: p.pid, srcId: p.srcId, name: p.name, number: p.number, pos: p.pos, sel: p.sel })),
  };
  const team = teamById(trnWiz.teamId);
  const obj = {
    id: trnWiz.id, name: trnWiz.name, date: trnWiz.date, location: trnWiz.location,
    teamId: trnWiz.teamId, teamName: team ? team.name : '',
    matchType: trnWiz.matchType || '8v8',
    trainer: trnWiz.trainer || '', responsible: trnWiz.responsible || '', squad,
  };
  const arr = getTournaments();
  const idx = arr.findIndex(t => t.id === obj.id);
  if (idx >= 0) arr[idx] = obj; else arr.push(obj);
  saveTournaments(arr);
  currentTournament = obj; trnWiz = null;
  go('tournament');
}
function renderTournamentNew() {
  if (!trnWiz) return '<div class="content"><p>Geen wizard.</p></div>';
  const titles = { 1: 'Info', 2: 'Selectie' };
  const pills = [1, 2].map(n => `<div class="step-pill ${trnWiz.step===n?'on':trnWiz.step>n?'done':''}"></div>`).join('');
  const body = trnWiz.step === 1 ? renderTrnStep1() : renderTrnStep2();
  return `<div class="hdr"><button class="back" onclick="${trnWiz.step===1 ? 'trnWizLeave()' : 'trnWizBack()'}">‹</button><h1>${trnWiz.isNew ? 'Nieuw tornooi' : 'Tornooi bewerken'} · ${titles[trnWiz.step]}</h1></div>
    <div class="steps">${pills}</div>
    <div class="content">${body}</div>`;
}
function renderTrnStep1() {
  const teams = getTeamsV2();
  const teamSel = teams.length
    ? `<select id="trn-team-sel" onchange="trnWizTeamChange()">${teams.map(t => `<option value="${t.id}" ${trnWiz.teamId===t.id?'selected':''}>${esc(t.name)}</option>`).join('')}</select>`
    : `<div style="font-size:14px;color:var(--txt2);padding:6px 0">Nog geen ploegen. <a onclick="go('teams')" style="color:var(--grn);font-weight:700;cursor:pointer">Maak eerst een ploeg aan →</a></div>`;
  const selectedTeam = teamById(trnWiz.teamId) || (teams.length ? teams[0] : null);
  const teamTrainers = selectedTeam ? (selectedTeam.trainers || []).filter(tr => tr.name) : [];
  const trainerOpts = teamTrainers.map(tr => `<option value="${esc(tr.name)}" ${!trnWiz.trainerIsOther&&trnWiz.trainer===tr.name?'selected':''}>${esc(tr.name)}</option>`).join('');
  return `<div class="card">
    <div class="fg"><label>Naam van het tornooi</label><input id="trn-name" type="text" placeholder="bv. Paastornooi Gent" value="${esc(trnWiz.name)}" autocomplete="off"></div>
    <div class="fg"><label>Ploeg</label>${teamSel}</div>
    <div class="fg"><label>Datum</label><input id="trn-date" type="date" value="${esc(trnWiz.date)}"></div>
    <div class="fg"><label>Locatie</label><input id="trn-location" type="text" placeholder="bv. Sportpark Gent" value="${esc(trnWiz.location)}" autocomplete="off"></div>
    <div class="fg"><label>Type wedstrijd</label><select id="trn-matchtype">${['3v3','5v5','8v8','11v11'].map(t=>`<option value="${t}" ${(trnWiz.matchType||'8v8')===t?'selected':''}>${t.replace('v',' tegen ')}</option>`).join('')}</select></div>
    <div class="fg"><label>Trainer</label>
      <select id="trn-trainer-sel" onchange="trnTrainerSelChange(this.value)">
        ${trainerOpts}
        <option value="_other" ${trnWiz.trainerIsOther?'selected':''}>Andere trainer…</option>
      </select></div>
    <div class="fg" id="trn-trainer-other-fg" style="${trnWiz.trainerIsOther?'':'display:none'}">
      <label>Naam trainer</label>
      <input id="trn-trainer-other" type="text" value="${esc(trnWiz.trainer||'')}" placeholder="Naam trainer" autocomplete="off">
    </div>
    <div class="fg"><label>Ploegverantwoordelijke (optioneel)</label>
      <input id="trn-responsible" type="text" value="${esc(trnWiz.responsible||'')}" placeholder="Naam (optioneel)" autocomplete="off">
    </div>
  </div>
  <button class="btn btn-green" onclick="trnWizNext()">Volgende → Selectie</button>
  <button class="btn btn-orgpale" onclick="saveTournamentWizStep1Only()" style="margin-top:8px">${icI(IC.calendar)} Opslaan zonder selectie</button>`;
}
function renderTrnStep2() {
  const team = teamById(trnWiz.teamId);
  const mee = trnWiz.pool.filter(p => p.sel === 'mee').length;
  const ab  = trnWiz.pool.filter(p => p.sel === 'absent').length;
  const selRow2 = p => `<div class="selrow">
    <input type="number" class="pn-inp" value="${esc(p.number)}" placeholder="?" onchange="setTrnPoolNum('${p.pid}',this.value)" inputmode="numeric" aria-label="Rugnummer">
    <div class="nm">${esc(p.name)}<small>${p.pos || '—'}</small></div>
    <div class="seg">
      <button class="${p.sel==='mee'?'basis':''}" onclick="setTrnSel('${p.pid}','mee')">Mee</button>
      <button class="${p.sel==='absent'?'absent':''}" onclick="setTrnSel('${p.pid}','absent')" title="Afwezig">✗</button>
    </div></div>`;
  return `
    <div class="card" style="display:flex;gap:10px;text-align:center;margin-bottom:12px">
      <div style="flex:1"><div style="font-size:22px;font-weight:900;color:var(--grn)">${mee}</div><div style="font-size:11px;color:var(--txt2)">MEE</div></div>
      ${ab ? `<div style="flex:1"><div style="font-size:22px;font-weight:900;color:var(--rd)">${ab}</div><div style="font-size:11px;color:var(--txt2)">AFWEZIG</div></div>` : ''}
    </div>
    <div class="sec">${esc(team ? team.name : 'Ploeg')}</div>
    <div class="card">${trnWiz.pool.length ? trnWiz.pool.map(selRow2).join('') : '<p style="color:var(--txt2);font-size:14px">Deze ploeg heeft geen spelers.</p>'}</div>
    <div class="wiz-nav">
      <button class="btn btn-gray" onclick="trnWizBack()">← Vorige</button>
      <button class="btn btn-green" onclick="saveTournamentWiz()">${icI(IC.check)}Tornooi opslaan</button>
    </div>`;
}

// ----- Tornooimatch wizard -----
function addTournamentMatch(trnId) {
  if (!canManage()) return;
  const t = tournamentById(trnId); if (!t) return;
  const team = teamById(t.teamId);
  const squad = t.squad || {};
  // Nieuw formaat: squad.players; oud formaat: squad.base/bench/absent
  const allSquadPlayers = squad.players
    ? squad.players.filter(s => s.sel !== 'absent')
    : [...(squad.base||[]), ...(squad.bench||[])];
  const totalSquad = squad.players
    ? squad.players.length
    : (squad.base||[]).length + (squad.bench||[]).length + (squad.absent||[]).length;
  if (!totalSquad) {
    openModal(`<h3>Selectie ontbreekt</h3>
      <p style="text-align:center;color:var(--txt2);margin-bottom:16px">Geef eerst een selectie in voor dit tornooi voor je wedstrijden toevoegt.</p>
      <button class="btn btn-green" onclick="closeModal();editTournament('${trnId}')">${icI(IC.edit)} Selectie ingeven</button>
      <button class="btn btn-gray" style="margin-top:8px" onclick="closeModal()">Annuleren</button>`);
    return;
  }
  // Bepaal het aantal basisspelers op basis van matchType (bv. 8v8 → 8 basis)
  const matchType = t.matchType || '8v8';
  const numStarters = parseInt(matchType) || 8;
  const pool = allSquadPlayers.map((s, i) => ({
    pid: uid(), srcId: s.srcId, name: s.name, number: s.number, pos: s.pos,
    fromName: team ? team.name : '', guest: false,
    sel: i < numStarters ? 'basis' : 'bank', slot: null,
  }));
  const now = new Date();
  wiz = {
    step: 1, trnMode: true, tournamentId: trnId,
    teamId: t.teamId, teamNameFallback: team ? team.name : '',
    opponent: '', date: t.date || now.toISOString().split('T')[0],
    time: `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`,
    location: t.location || 'Thuis', matchType,
    periodKey: 'delen', quarterDuration: 20, numQuarters: 1,
    competition: 'Tornooi', matchday: '', referee: '', jersey: '', venue: '',
    trainer: t.trainer || '', responsible: t.responsible || '', trainerIsOther: false,
    pool, poolTeamId: t.teamId, formationIndex: 0, selPlace: null,
  };
  go('new');
}
async function cloneTournamentMatch(matchId, trnId) {
  if (!canManage()) return;
  const src = await dbGet(matchId);
  if (!src) return;
  const t = tournamentById(trnId); if (!t) return;
  const team = teamById(t.teamId);
  const now = new Date();
  const pool = (src.players || []).map(p => ({
    pid: uid(),
    srcId: p.srcId || p.id,
    name: p.name,
    number: p.number,
    pos: p.line || p.pos || '',
    fromName: src.teamName || (team ? team.name : ''),
    guest: !!p.guest,
    sel: p.starting ? 'basis' : 'bank',
    slot: null,
    x: p.x, y: p.y, line: p.line, posNum: p.posNum,
  }));
  wiz = {
    step: 1, trnMode: true, tournamentId: trnId,
    teamId: t.teamId, teamNameFallback: team ? team.name : '',
    opponent: '',
    date: t.date || now.toISOString().split('T')[0],
    time: src.time || `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`,
    location: src.location || t.location || 'Thuis',
    matchType: src.matchType || t.matchType || '8v8',
    periodKey: src.periodKey || 'delen',
    quarterDuration: src.quarterDuration || 20,
    numQuarters: src.numQuarters || 1,
    competition: src.competition || 'Tornooi',
    matchday: '', referee: src.referee || '', jersey: src.jersey || '',
    venue: '', trainer: src.trainer || t.trainer || '',
    responsible: src.responsible || t.responsible || '',
    trainerIsOther: false,
    pool, poolTeamId: t.teamId, formationIndex: src.formationIndex || 0, selPlace: null,
  };
  go('new');
}
function renderTrnMatchStep1() {
  return `<div class="card">
    <div class="fg"><label>Tegenstander</label><input id="n-opp" type="text" placeholder="Naam tegenstander..." autocomplete="off" value="${esc(wiz.opponent)}"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="fg"><label>Datum</label><input id="n-date" type="date" value="${wiz.date}"></div>
      <div class="fg"><label>Startuur</label><input id="n-time" type="time" value="${wiz.time}"></div>
    </div>
    <div class="fg"><label>Wedstrijdtype</label>
      <select id="n-type" onchange="trnWizTypeChange()">
        ${['3v3','5v5','8v8','11v11'].map(tp => `<option value="${tp}" ${wiz.matchType===tp?'selected':''}>${tp.replace('v',' tegen ')}</option>`).join('')}
      </select></div>

let guestModalTeam = null, guestPick = [], guestTeamsCache = [];
async function addGuestsModal() {
  guestTeamsCache = [];

    const otherIds = Object.keys(userTeams).filter(id => id !== wiz.teamId);

        try {
          const s = await fbdb.ref('teams/' + id + '/roster').once('value');
          const raw = s.val();
          if (!raw) return;
          const arr = Array.isArray(raw) ? raw : Object.values(raw);
          const t = arr.find(x => x && x.id === id) || arr.find(x => x && x.players && x.players.length);
          if (t) fetched.push(Object.assign({}, t, { id, fromCloud: true, players: Array.isArray(t.players) ? t.players : [] }));

    const nd = slots.filter(s => s.line === V).length;
    const nm = slots.filter(s => s.line === M).length;
    const na = slots.filter(s => s.line === A).length;

      if (n === 4) return ([5,4,3,2])[pos] ?? pos+2;

    if (line === 'Aanval')      return ({ 1:[9], 2:[9,10], 3:[11,9,7] }[n] || [])[pos] || pos + 7;
  }
  if (matchType === '5v5') {
    if (line === 'Doel') return 1;
    if (line === 'Verdediging') return ({ 1:[3], 2:[3,4] }[n] || [])[pos] || 3;

function qrAdj(id, d) { qrScorers[id] = Math.max(0, (qrScorers[id] || 0) + d); const el = document.getElementById('qr-c-' + id); if (el) el.textContent = qrScorers[id]; }
async function saveQuickResult() {
  const us = Math.max(0, parseInt(document.getElementById('qr-us').value) || 0);
  const them = Math.max(0, parseInt(document.getElementById('qr-them').value) || 0);
  match.events = (match.events || []).filter(e => !e.quick); // eerdere snelinvoer wissen
  const sum = Object.values(qrScorers).reduce((a, b) => a + b, 0);
  const usFinal = Math.max(us, sum);
  Object.entries(qrScorers).forEach(([pid, c]) => { for (let i = 0; i < c; i++) match.events.push({ id: uid(), realTime: Date.now(), gameTimeMs: 0, quarterNum: null, type: 'goal_us', playerId: pid, assistId: null, quick: true }); });
  for (let i = 0; i < usFinal - sum; i++) match.events.push({ id: uid(), realTime: Date.now(), gameTimeMs: 0, quarterNum: null, type: 'goal_us', playerId: null, assistId: null, quick: true });
  for (let i = 0; i < them; i++) match.events.push({ id: uid(), realTime: Date.now(), gameTimeMs: 0, quarterNum: null, type: 'goal_them', quick: true });
  recomputeScore(match);
  match.status = 'done'; match.quarterStatus = 'done';
  await dbSave(match); closeModal(); go('detail', match.id);
}

function playerRowHtml(p, minsData, isOff=false, totalMs=0, extraBtn='') {
  if (minsData && minsData.absent) {
    const cap = (match && match.captainId === p.id) ? ` ${icI(IC.captain)}` : '';
    return `<div class="prow" style="opacity:.5">
      <div class="pnum pnum-off">${p.number||'?'}</div>
      <div style="flex:1"><div class="pname" style="text-decoration:line-through">${esc(p.name)}${cap}</div></div>
      <div class="pmins" style="margin-left:6px;color:var(--rd)">Afwezig</div>
    </div>`;
  }
  const ms = minsData ? minsData.ms : 0;
  const m = Math.floor(ms / 60000);
  const cap = (match && match.captainId === p.id) ? ` ${icI(IC.captain)}` : '';
  const motm = (match && match.motmId === p.id) ? ` ${icI(IC.motm)}` : '';
  const pct = totalMs > 0 ? Math.round(ms / totalMs * 100) : null;
  const low = pct !== null && pct < 50;
  const mid = pct !== null && pct >= 50 && pct < 75;
  const bar = pct !== null ? `<div class="fairbar ${low?'low':mid?'mid':''}" style="max-width:120px"><span style="width:${Math.min(100,pct)}%"></span></div>` : '';
  return `<div class="prow">
    <div class="pnum ${isOff?'pnum-off':''}">${p.number||'?'}</div>
    <div style="flex:1"><div class="pname">${esc(p.name)}${cap}${motm}</div>${bar}</div>
    <div class="pmins ${low?'pmins-warn':''}" style="margin-left:6px">${m}'${pct!==null?` · ${pct}%`:' gespeeld'}</div>
    ${extraBtn}
  </div>`;
}

// ===================== QUARTER CONTROLS =====================
async function startQuarter() {
  match.currentQuarter++;
  match.quarterStatus = 'running';
  match.quarters.push({ num: match.currentQuarter, startTime: Date.now(), endTime: null, totalPaused: 0, pausedAt: null });
  addEvent('quarter_start');
  // Tijdens de pauze ingeplande wissels nu automatisch doorvoeren bij de start van het deel.
  for (const s of (match.pendingSubs || [])) {
    const pOut = match.players.find(p => p.id === s.outId), pIn = match.players.find(p => p.id === s.inId);
    if (!pOut || !pIn) continue;
    addEvent('substitution', { playerOutId: s.outId, playerInId: s.inId, atBreak: true });
    pOut.onField = false;
    pIn.onField = true; pIn.x = pOut.x; pIn.y = pOut.y; pIn.line = pOut.line; pIn.posNum = pOut.posNum;
  }
  match.pendingSubs = [];
  for (const s of (match.pendingPosSwaps || [])) {
    const pA = match.players.find(p => p.id === s.pA), pB = match.players.find(p => p.id === s.pB);
    if (!pA || !pB) continue;
    addEvent('posSwap', { pA: s.pA, pB: s.pB, atBreak: true });
    const tmp = { x: pA.x, y: pA.y, line: pA.line, posNum: pA.posNum };
    pA.x = pB.x; pA.y = pB.y; pA.line = pB.line; pA.posNum = pB.posNum;
    pB.x = tmp.x; pB.y = tmp.y; pB.line = tmp.line; pB.posNum = tmp.posNum;
  }
  match.pendingPosSwaps = [];
  // Keeper voor dit deel = automatisch de speler op de doellijn.
  syncKeeper();
  requestWake();
  await dbSave(match); startTimer(); render();
}
// Keeper = automatisch de speler die op het veld op de doellijn staat.
function currentKeeperId(m) { const gk = m.players.find(p => p.onField && p.line === 'Doel'); return gk ? gk.id : null; }
// Houd de keeper van het lopende deel bij (voor minuten/overzicht). Volledig automatisch.
function syncKeeper() {
  if (!match || !match.currentQuarter) return;
  match.keeperByQ = match.keeperByQ || {};
  const kid = currentKeeperId(match);
  if (kid) match.keeperByQ[match.currentQuarter] = kid;
}
// Minuten in doel per keeper (op basis van keeperByQ × duur per deel).
function keeperMinutes(m) {
  const out = {};
  if (!m.keeperByQ) return out;
  for (const q of m.quarters) {
    const kid = m.keeperByQ[q.num]; if (!kid) continue;
    const dur = q.endTime ? q.endTime - q.startTime - (q.totalPaused || 0) : 0;
    out[kid] = (out[kid] || 0) + Math.max(0, dur);
  }
  return out;
}
async function pauseQuarter() {
  const q = match.quarters[match.quarters.length - 1];
  q.pausedAt = Date.now(); match.quarterStatus = 'paused';
  releaseWake();
  await dbSave(match); render();
}
async function resumeQuarter() {
  const q = match.quarters[match.quarters.length - 1];
  q.totalPaused = (q.totalPaused || 0) + (Date.now() - q.pausedAt); q.pausedAt = null;
  match.quarterStatus = 'running';
  requestWake();
  await dbSave(match); startTimer(); render();
}

async function doEndPeriod() {

// ===================== MANUELE HERPLAATSING =====================
let _ep = null; // { slots, assign: Map<slotIdx,playerId>, sel: playerId|null }
function modalEditPositions() {
  const forms = FORMATIONS[match.matchType] || [];
  if (!forms.length) { closeModal(); render(); return; }
  const fi = Math.max(0, forms.findIndex(f => f.name === match.formation));
  const slots = forms[fi].slots;
  // Initialiseer toewijzingen op basis van huidige spelerposities
  const assign = new Map();
  match.players.filter(p => p.starting && typeof p.x === 'number').forEach(p => {
    const si = slots.findIndex(s => s.x === p.x && s.y === p.y);
    if (si >= 0 && !assign.has(si)) assign.set(si, p.id);
  });
  _ep = { fi, slots, assign, sel: null };
  _renderEpModal();
}
function _epChangeFormation(fi) {
  const forms = FORMATIONS[match.matchType] || [];
  _ep.fi = parseInt(fi);
  _ep.slots = forms[_ep.fi].slots;
  _ep.assign = new Map();
  _ep.sel = null;
  _renderEpModal();
}
function _epSelectPlayer(pid) {
  _ep.sel = (_ep.sel === pid) ? null : pid;
  _renderEpModal();
}
function _epClickSlot(si) {
  const occupantId = _ep.assign.get(si);
  if (_ep.sel) {
    // Vorige positie van de geselecteerde speler opzoeken (null = komt uit "Nog te plaatsen")
    let prevSlot = null;
    for (const [k, v] of _ep.assign) if (v === _ep.sel) { prevSlot = k; break; }
    if (prevSlot === si) {
      // Zelfde positie opnieuw aangetikt → speler van het veld halen
      _ep.assign.delete(si);
    } else {
      if (prevSlot !== null) _ep.assign.delete(prevSlot);
      _ep.assign.set(si, _ep.sel);
      // Bezette positie: wissel van plek als de geselecteerde speler op het veld stond,
      // anders gaat de verdrongen speler terug naar "Nog te plaatsen".
      if (occupantId !== undefined && prevSlot !== null) _ep.assign.set(prevSlot, occupantId);
    }
    _ep.sel = null;
  } else if (occupantId !== undefined) {
    // Speler op het veld aantikken → selecteren om te verplaatsen of te wisselen
    _ep.sel = occupantId;
  }
  _renderEpModal();
}
function _renderEpModal() {
  const forms = FORMATIONS[match.matchType] || [];
  const form = forms[_ep.fi];
  const starters = match.players.filter(p => p.starting);
  const placedIds = new Set(_ep.assign.values());
  const unplaced = starters.filter(p => !placedIds.has(p.id));
  // Veld
  const slotsHtml = _ep.slots.map((s, i) => {
    const posNum = computePosNum(match.matchType, i, _ep.slots);
    const pid = _ep.assign.get(i);
    const p = pid ? match.players.find(x => x.id === pid) : null;
    const gk = s.line === 'Doel';
    if (p) return `<div class="pslot filled ${gk?'gk':''}" style="left:${s.x}%;top:${s.y}%${_ep.sel===p.id?';box-shadow:0 0 0 3px var(--org)':''}" onclick="_epClickSlot(${i})">${posNum}<span class="pslot-lbl">${esc(p.name)}</span></div>`;
    return `<div class="pslot ${gk?'gk':''}" style="left:${s.x}%;top:${s.y}%" onclick="_epClickSlot(${i})">${posNum}</div>`;
  }).join('');
  const chipsHtml = unplaced.length
    ? unplaced.map(p => `<span class="place-chip ${_ep.sel===p.id?'sel':''}" onclick="_epSelectPlayer('${p.id}')"><span class="pcn">${p.number||'?'}</span>${esc(p.name)}</span>`).join('')
    : `<span style="color:var(--grn);font-weight:700;font-size:14px">${icI(IC.check)} Iedereen geplaatst</span>`;
  const formSel = forms.map((f,i) => `<option value="${i}" ${i===_ep.fi?'selected':''}>${esc(f.name)}</option>`).join('');
  document.getElementById('modal').innerHTML = `<div class="modal-ov"><div class="modal">
    <h3>${icI(IC.shirt)} Posities herplaatsen</h3>
    <div class="fg" style="margin-bottom:8px"><label>Formatie</label><select onchange="_epChangeFormation(this.value)">${formSel}</select></div>
    <div class="card" style="padding:8px">${`<div class="pitch">${pitchLines()}${slotsHtml}</div>`}
      <div class="field-legend">Tik een speler hieronder en dan een positie om hem te plaatsen. Tik een speler op het veld en dan een andere positie om te verplaatsen of van plek te wisselen. Tik tweemaal dezelfde positie om de speler eraf te halen.</div>
    </div>
    <div class="sec" style="margin-top:8px">Nog te plaatsen (${unplaced.length})</div>
    <div class="place-chips">${chipsHtml}</div>
    <button class="btn btn-green" style="margin-top:12px" onclick="_saveEpPositions()">${icI(IC.check)} Opslaan</button>
    <button class="btn btn-gray" style="margin-top:8px" onclick="closeModal();render()">Annuleren</button>
  </div></div>`;
  document.getElementById('modal').classList.remove('hidden');
}
async function _saveEpPositions() {
  const forms = FORMATIONS[match.matchType] || [];
  const form = forms[_ep.fi];
  match.formation = form.name;
  // Reset alle starter-posities
  match.players.filter(p => p.starting).forEach(p => { p.x = undefined; p.y = undefined; p.line = undefined; p.posNum = undefined; });
  for (const [si, pid] of _ep.assign) {
    const p = match.players.find(x => x.id === pid);
    const s = _ep.slots[si];
    if (p && s) { p.x = s.x; p.y = s.y; p.line = s.line; p.posNum = computePosNum(match.matchType, si, _ep.slots); }
  }
  _ep = null;
  await dbSave(match); closeModal(); render();
}

function shareWhatsApp(m) {
  if (!m) return;
  const home = !isAway(m);
  const us = home ? tName(m) : m.opponent;
  const them = home ? m.opponent : tName(m);
  const usScore = home ? m.scoreUs : m.scoreThem;
  const themScore = home ? m.scoreThem : m.scoreUs;

  // Status
  const isDone = m.status === 'done';
  const qNum = m.currentQuarter || 0;
  const statusTxt = isDone
    ? 'Afgelopen'
    : (m.quarterStatus === 'between' ? 'Pauze' : (qNum > 0 ? 'Bezig' : 'Nog niet gestart'));

  // Doelpunten voor ons (met minuut)
  const goalEvents = m.events.filter(e =>
    e.type === 'goal_us' || e.type === 'own_goal_them' ||
    (e.type === 'penalty_us' && e.scored)
  );
  const goalLines = goalEvents.map(e => {
    const min = e.gameTimeMs != null ? eventMinSummaryText(e, m) : '';
    if (e.type === 'own_goal_them') return `  ⚽ ${min} Eigen doel tegenstander`;
    const scorer = e.playerId ? pName(m, e.playerId) : '?';

async function shareReport() {
  const m = match;
  const tally = (filter, key) => {
    const cnt = {};
    m.events.filter(filter).forEach(e => { const id = e[key]; if (!id) return; const n = pName(m, id); cnt[n] = (cnt[n] || 0) + 1; });
    return Object.entries(cnt).map(([n, c]) => c > 1 ? `${n} (${c})` : n).join(', ');
  };
  const scLine = tally(e => e.type === 'goal_us' || (e.type === 'penalty_us' && e.scored), 'playerId');
  const asLine = tally(e => e.type === 'goal_us' && e.assistId, 'assistId');
  const ycLine = tally(e => e.type === 'yellow_card', 'playerId');
  const rcLine = tally(e => e.type === 'red_card', 'playerId');
  const lines = [`${isAway(m)?m.opponent:tName(m)} ${scoreTxt(m)} ${isAway(m)?tName(m):m.opponent}`, `${matchWhen(m)} · ${m.location}${m.competition ? ' · ' + m.competition : ''}`];
  if (scLine) lines.push(`⚽ ${scLine}`);
  if (asLine) lines.push(`🎯 Assists: ${asLine}`);
  if (ycLine) lines.push(`🟨 ${ycLine}`);
  if (rcLine) lines.push(`🟥 ${rcLine}`);
  if (m.motmId) lines.push(`⭐ Man v/d match: ${pName(m, m.motmId)}`);
  if (isAdmin && m.notes) lines.push('', m.notes);
  // Volgende geplande wedstrijd van dezelfde ploeg
  try {
    const all = await dbAll();
    const today = new Date().toISOString().split('T')[0];
    const next = all.filter(x => x.teamName === m.teamName && x.status === 'planned' && (x.date || '') >= today).sort((a, b) => (a.date || '').localeCompare(b.date || ''))[0];
    if (next) lines.push('', `📅 Volgende: ${tName(next)} vs ${next.opponent} — ${matchWhen(next)}${next.location ? ' · ' + next.location : ''}`);
  } catch (e) {}
  lines.push('', `— ${getClubName()}`);
  const text = lines.join('\n');
  if (navigator.share) { try { await navigator.share({ title: `${tName(m)} vs ${m.opponent}`, text }); } catch (e) {} }
  else { try { await navigator.clipboard.writeText(text); showToast('Verslag gekopieerd naar klembord', 'ok'); } catch (e) { showToast(text, ''); } }
}

let _postEventQuarter = null; // null = gebruik match.currentQuarter (live), anders: kwart-override (detail)
let _postEventMinute = null;  // null = einde van het deel, anders: minuut binnen het deel (1-based)
// Cumulatieve speeltijd t/m het EINDE van kwart qNum (voor retrograde events).
function gameTimeMsAtEndOfQuarter(m, qNum) {
  let t = 0;
  for (const q of [...m.quarters].sort((a,b) => a.num - b.num)) {
    if (q.num > qNum) break;
    if (q.endTime && q.startTime) t += q.endTime - q.startTime - (q.totalPaused || 0);
    else t += (m.quarterDuration || 15) * 60000; // fallback: nominale kwartduur
  }
  return Math.max(0, t);
}
function addEvent(type, extra={}) {
  const qn = _postEventQuarter !== null ? _postEventQuarter : match.currentQuarter;
  let gms;
  if (_postEventQuarter !== null && _postEventQuarter) {
    if (_postEventMinute !== null) {
      gms = gameTimeMsAtStartOfQuarter(match, _postEventQuarter) + (_postEventMinute - 1) * 60000;
    } else {
      gms = Math.max(0, gameTimeMsAtEndOfQuarter(match, _postEventQuarter) - 1);
    }
  } else {
    gms = getGameTimeMs(match);
  }
  match.events.push({ id: uid(), realTime: Date.now(), gameTimeMs: gms, quarterNum: qn, type, ...extra });
}

function hasUndo() { return match && match.events.some(e => e.type !== 'quarter_start' && e.type !== 'quarter_end'); }
async function undoLast() {
  let idx = -1;
  for (let i = match.events.length - 1; i >= 0; i--) { const t = match.events[i].type; if (t !== 'quarter_start' && t !== 'quarter_end') { idx = i; break; } }
  if (idx < 0) return;
  const removed = match.events[idx];
  match.events.splice(idx, 1);
  recomputeScore(match); recomputeOnField(match);
  await dbSave(match); render();
  showUndoToast(`<i class="ti ti-arrow-back-up" style="font-size:1em;vertical-align:-.1em"></i> Ongedaan: ${evtLabel(removed, match)}`);
}
function showUndoToast(html) {
  let t = document.getElementById('undo-toast');
  if (t) { clearTimeout(t._to); t.remove(); }
  t = document.createElement('div'); t.id = 'undo-toast'; t.innerHTML = html;
  document.body.appendChild(t);
  t._to = setTimeout(() => { if (t.parentNode) t.remove(); }, 3000);
}

// ===================== MODAL: SUB =====================
let subOut = null, subIn = null;
function modalSub() {
  const between = match.quarterStatus === 'between' && _postEventQuarter === null;
  const on = _postEventQuarter != null ? playersAtPeriodStart(match, _postEventQuarter) : effectiveOnField(match);
  const mins = calcMinutes(match);
  const onIds = new Set(on.map(p => p.id));
  // bank gesorteerd op minst gespeeld, zodat eerlijke rotatie makkelijk is
  const off = match.players.filter(p => !onIds.has(p.id)).slice().sort((a, b) => (mins[a.id]?.ms || 0) - (mins[b.id]?.ms || 0));
  const minMs = off.length ? (mins[off[0].id]?.ms || 0) : 0;
  const mm = id => Math.floor((mins[id]?.ms || 0) / 60000);
  subOut = null; subIn = null;
  const title = between ? `${icI(IC.swap)} Pauzewissel · ${pSing(match)} ${match.currentQuarter + 1}` : `${icI(IC.swap)} Wissel`;
  const cta = between ? `${icI(IC.check)} Pauzewissel inplannen` : `${icI(IC.check)} Wissel doorvoeren`;
  const hint = between ? '<p style="text-align:center;color:var(--txt2);font-size:13px;margin-bottom:12px">Wordt automatisch doorgevoerd bij de start van het volgende deel.</p>' : '';
  openModal(`<h3>${title}</h3>${hint}
    <div class="sec" style="margin-top:0">Wie gaat ERAF?</div>
    <div id="sub-out">${pgGrid(on.map(p=>pgBtn(p,'sub-ob',`selectSubOut('${p.id}',this)`,`<span style="font-size:10px;color:var(--txt2)">${mm(p.id)}'</span>`)).join(''))}</div>
    <div class="sec">Wie komt ERIN? <span style="color:var(--txt2);font-weight:400;text-transform:none">(minst gespeeld bovenaan)</span></div>
    <div id="sub-in">${off.length ? pgGrid(off.map(p=>{ const low=(mins[p.id]?.ms||0)===minMs; return pgBtn(p,'sub-ib',`selectSubIn('${p.id}',this)`,`<span style="font-size:10px;color:${low?'var(--org)':'var(--txt2)'};">${mm(p.id)}'${low?' ●':''}</span>`); }).join('')) : '<p style="color:var(--txt2);font-size:14px;padding:8px 0">Geen spelers op de bank.</p>'}</div>
    <button class="btn btn-green" style="margin-top:12px" onclick="confirmSub()">${cta}</button>
    <button class="btn btn-gray" style="margin-top:8px" onclick="closeModal()">Annuleren</button>`);
}
function selectSubOut(id, el) { subOut = id; gpSelIn('sub-out', el); }
function selectSubIn(id, el) { subIn = id; gpSelIn('sub-in', el); }
async function confirmSub() {
  if (!subOut || !subIn) { showToast('Kies wie eraf gaat en wie erin komt.', 'err'); return; }
  // Tijdens de pauze: wissel inplannen i.p.v. meteen doorvoeren.
  if (match.quarterStatus === 'between') {
    match.pendingSubs = match.pendingSubs || [];
    match.pendingSubs.push({ outId: subOut, inId: subIn });
    await dbSave(match); closeModal(); render();
    return;
  }
  addEvent('substitution', { playerOutId: subOut, playerInId: subIn });
  const pOut = match.players.find(p => p.id === subOut), pIn = match.players.find(p => p.id === subIn);
  if (pOut) pOut.onField = false;
  if (pIn) { pIn.onField = true; if (pOut) { pIn.x = pOut.x; pIn.y = pOut.y; pIn.line = pOut.line; pIn.posNum = pOut.posNum; } }
  syncKeeper(); // keeper volgt automatisch de doellijn
  await dbSave(match); closeModal(); render();
}
async function removePendingSub(i) { if (match.pendingSubs) match.pendingSubs.splice(i, 1); await dbSave(match); render(); }

async function logCard(color, pid) {
  if (color === 'red') { addEvent('red_card', { playerId: pid }); const p = match.players.find(x=>x.id===pid); if (p) p.onField = false; }
  else {
    addEvent('yellow_card', { playerId: pid });
    const prevYellow = match.events.filter(e => e.type === 'yellow_card' && e.playerId === pid).length;
    if (prevYellow >= 2) {
      addEvent('red_card', { playerId: pid });
      const p = match.players.find(x => x.id === pid);
      if (p) p.onField = false;
      showToast(`2e gele kaart → ${p ? p.name : 'Speler'} krijgt automatisch rood en verlaat het veld.`, 'err');
    }
  }
  await dbSave(match); closeModal(); render();
  requestAnimationFrame(() => {
    const ic = document.querySelector(color === 'red' ? '.evtbtn.ered .ei' : '.evtbtn.eyel .ei');
    if (ic) { ic.classList.remove('card-anim'); void ic.offsetWidth; ic.classList.add('card-anim'); }
  });
}

function pickPhoto(slot) {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*';
